<body class="h-full flex flex-col antialiased">
    
    <div id="root" class="h-full flex flex-col"></div>

    <!-- React Application Code -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom SVG Icons
        const CloudIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.47 0-.89.09-1.24.26A7 7 0 1 0 3 16.06V16a4 4 0 0 0 4 4h10.5Z"/></svg>
        );

        const WhatsAppIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        );

        // Floating WhatsApp Support Button Component
        const WhatsAppButton = () => (
            <a
                href="https://wa.me/5562994049949"
                target="_blank"
                rel="noopener noreferrer"
                className="fixed bottom-6 right-6 z-[200] bg-[#25D366] hover:bg-[#20BD5A] text-white h-14 w-14 rounded-full flex items-center justify-center shadow-2xl transition-all hover:scale-110 active:scale-95"
                title="Suporte via WhatsApp"
                style={{ animation: 'pulse-whatsapp 2s infinite' }}
            >
                <WhatsAppIcon />
            </a>
        );

        // Developer Footer Component
        const DevFooter = () => (
            <div className="w-full text-center py-4 mt-auto">
                <a
                    href="https://voracloud.com.br"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="text-[10px] text-zinc-600 hover:text-emerald-500 font-bold uppercase tracking-widest transition-colors"
                >
                    Desenvolvido por voracloud.com.br
                </a>
            </div>
        );

        const DEFAULT_RATES = {
            'VISA': [2.50, 3.68, 4.53, 5.38, 6.23, 7.08, 8.23, 9.08, 9.93, 10.78, 11.63, 12.48],
            'MasterCard': [2.50, 3.68, 4.53, 5.38, 6.23, 7.08, 8.23, 9.08, 9.93, 10.78, 11.63, 12.48],
            'ELO': [2.50, 3.68, 4.53, 5.38, 6.23, 7.08, 8.23, 9.08, 9.93, 10.78, 11.63, 12.48],
            'Hiper': [2.50, 3.68, 4.53, 5.38, 6.23, 7.08, 8.23, 9.08, 9.93, 10.78, 11.63, 12.48]
        };

        const makeRates = (base) => {
            const arr = new Array(24).fill(0);
            base.forEach((r, i) => arr[i] = r);
            return arr;
        };

        const getInitialDefaults = () => [
            { name: 'VISA', color: '#0d47a1', maxParc: 12, pixRate: 0, debitRate: 0, rates: makeRates(DEFAULT_RATES['VISA']) },
            { name: 'MasterCard', color: '#f57f17', maxParc: 12, pixRate: 0, debitRate: 0, rates: makeRates(DEFAULT_RATES['MasterCard']) },
            { name: 'ELO', color: '#000000', maxParc: 12, pixRate: 0, debitRate: 0, rates: makeRates(DEFAULT_RATES['ELO']) },
            { name: 'Hiper', color: '#c62828', maxParc: 12, pixRate: 0, debitRate: 0, rates: makeRates(DEFAULT_RATES['Hiper']) }
        ];

        function App() {
            // Supabase and Authentication State
            const [supabaseConfig, setSupabaseConfig] = useState(() => {
                const saved = localStorage.getItem('vora_supabase_config');
                if (saved) return JSON.parse(saved);
                return {
                    url: 'https://gejpfozexjxajahgtusr.supabase.co',
                    anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlanBmb3pleGp4YWphaGd0dXNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzI3MjAsImV4cCI6MjA5MzMwODcyMH0.ivLVbj2jbhfXspNeC4NCN1O2NEIpfvarR_zU9w3FX3o'
                };
            });
            const [supabase, setSupabase] = useState(null);

            // Supabase Config Form inputs
            const [configUrl, setConfigUrl] = useState(() => supabaseConfig.url);
            const [configAnonKey, setConfigAnonKey] = useState(() => supabaseConfig.anonKey);
            const [isConfiguringSupabase, setIsConfiguringSupabase] = useState(false);

            const saveSupabaseConfig = (e) => {
                e.preventDefault();
                if (!configUrl.trim() || !configAnonKey.trim()) {
                    alert("Preencha todos os campos da conexão.");
                    return;
                }
                const newConfig = {
                    url: configUrl.trim(),
                    anonKey: configAnonKey.trim()
                };
                localStorage.setItem('vora_supabase_config', JSON.stringify(newConfig));
                setSupabaseConfig(newConfig);
                setIsConfiguringSupabase(false);
                window.location.reload();
            };

            const [user, setUser] = useState(() => {
                const saved = sessionStorage.getItem('vora_admin_user');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed && parsed.tenant_id === undefined) {
                        parsed.tenant_id = null;
                    }
                    return parsed;
                }
                return null;
            });

            // Login Form inputs
            const [loginUsername, setLoginUsername] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [authError, setAuthError] = useState('');
            const [authLoading, setAuthLoading] = useState(false);

            // Tab selection (for global administrators)
            const [activeTab, setActiveTab] = useState('global'); // 'global' or 'tenants'

            // Global manager state (original)
            const [profilesList, setProfilesList] = useState([]);
            const [historyList, setHistoryList] = useState([]);
            const [allHistoryList, setAllHistoryList] = useState([]);
            const [selectedProfileRates, setSelectedProfileRates] = useState(null);
            const [managerSearch, setManagerSearch] = useState('');

            // Multi-tenant Corporate state
            const [tenantsList, setTenantsList] = useState([]);
            const [selectedTenantId, setSelectedTenantId] = useState(''); // Selected tenant ID for global admin
            const [tenantData, setTenantData] = useState(null); // Active tenant record being configured
            const [tenantVisitors, setTenantVisitors] = useState([]); // visitor list for tenant
            const [tenantSearch, setTenantSearch] = useState('');
            const [isSavingTenant, setIsSavingTenant] = useState(false);
            const [dbWarning, setDbWarning] = useState(false);
            const [tenantOperatorsList, setTenantOperatorsList] = useState([]);
            const [tenantOperatorsHistoryList, setTenantOperatorsHistoryList] = useState([]);
            const [isSpyingTenant, setIsSpyingTenant] = useState(false);
            const [editingSubscriptionTenant, setEditingSubscriptionTenant] = useState(null);
            const [subAccessType, setSubAccessType] = useState('lifetime');
            const [subExpiresAt, setSubExpiresAt] = useState('');
            const [allVisitorsList, setAllVisitorsList] = useState([]);

            // Operator creation state
            const [newOperatorName, setNewOperatorName] = useState('');
            const [newOperatorPhone, setNewOperatorPhone] = useState('');
            const [newOperatorIsManager, setNewOperatorIsManager] = useState(false);
            const [isCreateOperatorOpen, setIsCreateOperatorOpen] = useState(false);

            // New Tenant Modal Form State
            const [isCreateTenantOpen, setIsCreateTenantOpen] = useState(false);
            const [newTenantName, setNewTenantName] = useState('');
            const [newTenantSlug, setNewTenantSlug] = useState('');

            // Editing Rates Modal State (for active tenant cards_data)
            const [editingIdx, setEditingIdx] = useState(null);
            const [modalData, setModalData] = useState(null);
            const [modalRates, setModalRates] = useState([]);

            // Inicializar cliente do Supabase
            useEffect(() => {
                try {
                    const client = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);
                    setSupabase(client);
                } catch (e) {
                    console.error("Erro ao inicializar cliente Supabase:", e);
                }
            }, [supabaseConfig]);

            // Carregar dados conforme o tipo de gestor logado
            const fetchManagerData = async (currentUser = user) => {
                if (!supabase || !currentUser || !currentUser.is_manager) return;

                try {
                    // Se o gestor for Administrador Global (tenant_id === null)
                    if (currentUser.tenant_id === null) {
                        // Carregar operadores
                        const { data: profiles, error: pError } = await supabase
                            .from('profiles')
                            .select('*')
                            .order('created_at', { ascending: false });

                        if (pError) throw pError;
                        setProfilesList(profiles || []);

                        // Carregar conexões
                        const { data: history, error: hError } = await supabase
                            .from('connection_history')
                            .select(`
                                id,
                                logged_in_at,
                                user_id,
                                profiles (
                                    name,
                                    phone
                                )
                            `)
                            .order('logged_in_at', { ascending: false })
                            .limit(100);

                        if (hError) throw hError;
                        setHistoryList(history || []);

                        // Carregar histórico completo para contagem e última conexão
                        const { data: allHistory, error: ahError } = await supabase
                            .from('connection_history')
                            .select('user_id, logged_in_at')
                            .order('logged_in_at', { ascending: false });

                        if (ahError) throw ahError;
                        setAllHistoryList(allHistory || []);

                        // Carregar empresas parceiras
                        const { data: tenants, error: tError } = await supabase
                            .from('tenants')
                            .select('*')
                            .order('name', { ascending: true });

                        if (tError) throw tError;
                        setTenantsList(tenants || []);

                        // Carregar todos os visitantes para contagem de leads
                        const { data: allVisitors, error: avError } = await supabase
                            .from('tenant_visitors')
                            .select('tenant_id');
                        if (avError) throw avError;
                        setAllVisitorsList(allVisitors || []);
                    }

                    // Determinar ID da empresa ativa
                    const activeCompanyId = currentUser.tenant_id || selectedTenantId;
                    if (activeCompanyId) {
                        const { data: tenant, error: tErr } = await supabase
                            .from('tenants')
                            .select('*')
                            .eq('id', activeCompanyId)
                            .maybeSingle();

                        if (tErr) throw tErr;
                        if (tenant) {
                            setTenantData(tenant);
                        }

                        // Carregar os operadores do tenant
                        const { data: tenantProfiles, error: tpErr } = await supabase
                            .from('profiles')
                            .select('*')
                            .eq('tenant_id', activeCompanyId)
                            .order('created_at', { ascending: false });

                        if (tpErr) throw tpErr;
                        
                        if (currentUser.tenant_id !== null) {
                            setProfilesList(tenantProfiles || []);
                        } else {
                            setTenantOperatorsList(tenantProfiles || []);
                        }

                        // Carregar histórico de visitantes da empresa
                        const { data: visitors, error: vErr } = await supabase
                            .from('tenant_visitors')
                            .select('*')
                            .eq('tenant_id', activeCompanyId)
                            .order('visited_at', { ascending: false });

                        if (vErr) throw vErr;
                        setTenantVisitors(visitors || []);

                        // Carregar histórico de conexões dos lojistas da empresa
                        const tProfileIds = (tenantProfiles || []).map(p => p.id);
                        if (tProfileIds.length > 0) {
                            const { data: tHistory, error: thErr } = await supabase
                                .from('connection_history')
                                .select(`
                                    id,
                                    logged_in_at,
                                    user_id,
                                    profiles (
                                        name,
                                        phone
                                    )
                                `)
                                .in('user_id', tProfileIds)
                                .order('logged_in_at', { ascending: false })
                                .limit(50);
                            
                            if (thErr) throw thErr;
                            if (currentUser.tenant_id !== null) {
                                setHistoryList(tHistory || []);
                            } else {
                                setTenantOperatorsHistoryList(tHistory || []);
                            }
                        } else {
                            if (currentUser.tenant_id !== null) {
                                setHistoryList([]);
                            } else {
                                setTenantOperatorsHistoryList([]);
                            }
                        }
                    } else {
                        setTenantData(null);
                        setTenantVisitors([]);
                        if (currentUser.tenant_id !== null) {
                            setProfilesList([]);
                            setHistoryList([]);
                        } else {
                            setTenantOperatorsList([]);
                            setTenantOperatorsHistoryList([]);
                        }
                    }

                    setDbWarning(false); // Tudo certo

                } catch (err) {
                    console.error("Erro ao carregar dados do painel:", err);
                    if (err.message && (err.message.includes("does not exist") || err.message.includes("404") || err.code === '42P01' || err.message.includes("Failed to fetch"))) {
                        setDbWarning(true);
                    }
                }
            };

            // Recarregar dados periodicamente
            useEffect(() => {
                if (supabase && user && user.is_manager) {
                    fetchManagerData();
                    const interval = setInterval(fetchManagerData, 15000);
                    return () => clearInterval(interval);
                }
            }, [supabase, user, selectedTenantId]);

            // Obter estatísticas agregadas do tenant para exibição na lista
            const getTenantStats = (tenant) => {
                const tenantProfiles = profilesList.filter(p => p.tenant_id === tenant.id);
                const manager = tenantProfiles.find(p => p.is_manager);
                const leadsCount = allVisitorsList.filter(v => v.tenant_id === tenant.id).length;
                const profileIds = tenantProfiles.map(p => p.id);
                const connectionsCount = allHistoryList.filter(h => profileIds.includes(h.user_id)).length;

                return {
                    managerName: manager ? manager.name : 'Sem admin',
                    managerPhone: manager ? manager.phone : '',
                    leadsCount,
                    connectionsCount
                };
            };

            // Excluir empresa parceira e seus dados
            const deleteTenant = async (tenantId) => {
                if (!confirm("Tem certeza que deseja excluir esta empresa e TODOS os seus dados permanentemente? Esta ação também excluirá os perfis de gestor, operadores, histórico de conexões e visitantes/leads vinculados.")) return;
                try {
                    // 1. Obter ids dos perfis associados
                    const { data: profiles, error: getPErr } = await supabase
                        .from('profiles')
                        .select('id')
                        .eq('tenant_id', tenantId);
                    
                    if (getPErr) throw getPErr;
                    
                    const profileIds = (profiles || []).map(p => p.id);
                    if (profileIds.length > 0) {
                        // 2. Deletar histórico de conexões associado
                        const { error: chErr } = await supabase
                            .from('connection_history')
                            .delete()
                            .in('user_id', profileIds);
                        if (chErr) throw chErr;
                        
                        // 3. Deletar perfis
                        const { error: pErr } = await supabase
                            .from('profiles')
                            .delete()
                            .in('id', profileIds);
                        if (pErr) throw pErr;
                    }
                    
                    // 4. Deletar visitantes/leads
                    const { error: vErr } = await supabase
                        .from('tenant_visitors')
                        .delete()
                        .eq('tenant_id', tenantId);
                    if (vErr) throw vErr;
                    
                    // 5. Deletar a empresa
                    const { error: tErr } = await supabase
                        .from('tenants')
                        .delete()
                        .eq('id', tenantId);
                    if (tErr) throw tErr;

                    alert("Empresa excluída com sucesso!");
                    if (selectedTenantId === tenantId) {
                        setSelectedTenantId('');
                        setTenantData(null);
                        setIsSpyingTenant(false);
                    }
                    fetchManagerData();
                } catch (err) {
                    console.error("Erro ao excluir empresa:", err);
                    alert("Erro ao excluir empresa: " + err.message);
                }
            };

            // Pausar / Ativar empresa
            const toggleBlockTenant = async (tenant) => {
                const newStatus = !tenant.is_blocked;
                try {
                    const { error } = await supabase
                        .from('tenants')
                        .update({ is_blocked: newStatus })
                        .eq('id', tenant.id);
                    
                    if (error) throw error;
                    alert(`Empresa "${tenant.name}" ${newStatus ? 'bloqueada/pausada' : 'desbloqueada/ativada'} com sucesso.`);
                    fetchManagerData();
                } catch (err) {
                    console.error("Erro ao alterar status:", err);
                    alert("Erro ao alterar status: " + err.message);
                }
            };

            // Salvar alteração de plano
            const saveSubscription = async (e) => {
                if (e) e.preventDefault();
                if (!editingSubscriptionTenant) return;
                
                try {
                    const expiresVal = subAccessType === 'monthly' && subExpiresAt 
                        ? new Date(subExpiresAt + "T23:59:59").toISOString() 
                        : null;

                    const { error } = await supabase
                        .from('tenants')
                        .update({
                            access_type: subAccessType,
                            expires_at: expiresVal
                        })
                        .eq('id', editingSubscriptionTenant.id);

                    if (error) throw error;
                    alert("Plano de acesso atualizado com sucesso!");
                    setEditingSubscriptionTenant(null);
                    fetchManagerData();
                } catch (err) {
                    console.error("Erro ao atualizar plano:", err);
                    alert("Erro ao atualizar plano: " + err.message);
                }
            };

            const handleLogin = async (e) => {
                if (e) e.preventDefault();
                if (!supabase) {
                    setAuthError("Erro de conexão com o banco de dados.");
                    return;
                }
                const rawUsername = loginUsername.trim();
                const rawPassword = loginPassword.trim();
                if (!rawUsername || !rawPassword) {
                    setAuthError("Preencha todos os campos.");
                    return;
                }

                setAuthLoading(true);
                setAuthError('');

                try {
                    const cleanPhone = rawPassword.replace(/\D/g, '');
                    let profiles = [];
                    let error = null;

                    // 1. Tentar buscar pelo phone limpo
                    if (cleanPhone) {
                        const { data: p, error: err } = await supabase
                            .from('profiles')
                            .select('*')
                            .eq('phone', cleanPhone);
                        if (p) profiles = [...profiles, ...p];
                        if (err) error = err;
                    }

                    // 2. Tentar buscar pelo texto exato (para usuários customizados como 'fabio')
                    const { data: pExact, error: errExact } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('phone', rawPassword);
                    if (pExact) profiles = [...profiles, ...pExact];
                    if (errExact) error = errExact;

                    if (error) throw error;

                    // Filtrar perfil pelo nome do usuário (case-insensitive)
                    const profile = (profiles || []).find(p => p.name && p.name.trim().toLowerCase() === rawUsername.toLowerCase());

                    if (!profile) {
                        setAuthError("Usuário ou senha inválidos.");
                        setAuthLoading(false);
                        return;
                    }

                    if (!profile.is_manager) {
                        setAuthError("Acesso restrito a gestores.");
                        setAuthLoading(false);
                        return;
                    }

                    if (profile.tenant_id !== null && profile.tenant_id !== undefined) {
                        setAuthError("Acesso restrito. Utilize o link administrativo específico da sua empresa parceira.");
                        setAuthLoading(false);
                        return;
                    }

                    // Registrar conexão
                    await supabase
                        .from('connection_history')
                        .insert({ user_id: profile.id });

                    if (profile.tenant_id === undefined) {
                        profile.tenant_id = null;
                    }

                    sessionStorage.setItem('vora_admin_user', JSON.stringify(profile));
                    setUser(profile);
                    
                    fetchManagerData(profile);

                } catch (err) {
                    console.error("Erro de autenticação:", err);
                    setAuthError("Falha na autenticação: " + err.message);
                } finally {
                    setAuthLoading(false);
                }
            };

            const handleLogout = () => {
                sessionStorage.removeItem('vora_admin_user');
                setUser(null);
                setProfilesList([]);
                setHistoryList([]);
                setTenantsList([]);
                setTenantData(null);
                setTenantVisitors([]);
            };

            // Criar nova empresa (Global Admin apenas)
            const handleCreateTenant = async (e) => {
                e.preventDefault();
                if (!supabase || !newTenantName.trim() || !newTenantSlug.trim()) return;

                try {
                    const cleanSlug = newTenantSlug.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
                    
                    const { data: createdTenant, error } = await supabase
                        .from('tenants')
                        .insert({
                            name: newTenantName.trim(),
                            slug: cleanSlug,
                            phrase: 'Calculadora de taxas personalizadas',
                            logo_text: newTenantName.trim().substring(0, 1).toUpperCase(),
                            cards_data: getInitialDefaults()
                        })
                        .select()
                        .single();

                    if (error) throw error;

                    alert(`Empresa "${newTenantName}" cadastrada com sucesso!`);
                    setIsCreateTenantOpen(false);
                    setNewTenantName('');
                    setNewTenantSlug('');
                    
                    // Atualizar lista
                    fetchManagerData();
                    setSelectedTenantId(createdTenant.id);

                    console.error("Erro ao criar empresa:", err);
                    alert("Erro ao criar empresa: " + err.message);
                }
            };

            // Salvar alterações de branding e taxas da empresa ativa

                if (!supabase || !tenantData) return;

                setIsSavingTenant(true);
                try {
                    const { error } = await supabase
                        .from('tenants')
                        .update({
                            name: tenantData.name,
                            phrase: tenantData.phrase,
                            logo_text: tenantData.logo_text,
                            logo_image: tenantData.logo_image,
                            whatsapp_number: tenantData.whatsapp_number,
                            whatsapp_message: tenantData.whatsapp_message,
                            cards_data: tenantData.cards_data,
                            structure_type: tenantData.structure_type || 'individual'

                        .eq('id', tenantData.id);

                    if (error) throw error;
                    alert("Configurações e taxas da empresa salvas com sucesso!");
                    fetchManagerData();
                } catch (err) {
                    console.error("Erro ao salvar alterações da empresa:", err);
                    alert("Erro ao salvar alterações: " + err.message);

                if (!supabase || !activeCompanyId || !newOperatorName.trim() || !newOperatorPhone.trim()) return;

                try {
                    const cleanPhone = newOperatorPhone.trim().replace(/\D/g, '');
                    const phoneVal = cleanPhone || newOperatorPhone.trim();

                    const { error } = await supabase
                        .from('profiles')
                        .insert({
                            name: newOperatorName.trim(),
                            phone: phoneVal,
                            is_manager: newOperatorIsManager,

                    setIsCreateOperatorOpen(false);
                    setNewOperatorName('');
                    setNewOperatorPhone('');
                    setNewOperatorIsManager(false);

                    console.error("Erro ao criar operador:", err);

                try {
                    const { error } = await supabase

                const ratesList = [];
                // PIX
                const pxRate = col.pixRate !== undefined ? col.pixRate : 0;
                const pxCoef = 1 - pxRate / 100;
                ratesList.push({
                    installment: 'PIX',
                    percentStr: pxRate.toString().replace('.', ','),
                    coefStr: parseFloat(pxCoef.toFixed(6)).toString().replace('.', ',')

                // DÉBITO
                const dbRate = col.debitRate !== undefined ? col.debitRate : 0;
                const dbCoef = 1 - dbRate / 100;
                ratesList.push({
                    installment: 'DÉBITO',
                    percentStr: dbRate.toString().replace('.', ','),
                    coefStr: parseFloat(dbCoef.toFixed(6)).toString().replace('.', ',')
                });
                // Parcelas
                col.rates.forEach((rate, i) => {
                    const p = rate || 0;
                    const c = 1 - p / 100;
                    ratesList.push({
                        installment: i + 1,
                        percentStr: p.toString().replace('.', ','),
                        coefStr: parseFloat(c.toFixed(6)).toString().replace('.', ',')
                    });
                });

                setModalRates(ratesList);
            };

            const saveCurrent = () => {
                if (!modalData || editingIdx === null || !tenantData) return;

                let maxParc = modalData.maxParc;
                if (maxParc < 1) maxParc = 1;
                if (maxParc > 24) maxParc = 24;

                let pixRate = 0;
                let debitRate = 0;
                const rates = [];

                modalRates.forEach(item => {
                    const p = parseFloat(item.percentStr.replace(',', '.'));
                    const val = isNaN(p) ? 0 : p;
                    if (item.installment === 'PIX') {
                        pixRate = val;
                    } else if (item.installment === 'DÉBITO') {
                        debitRate = val;
                    } else {
                        const idx = parseInt(item.installment) - 1;
                        rates[idx] = val;
                    }
                });

                while (rates.length < 24) rates.push(0);

                const updatedCards = [...tenantData.cards_data];
                updatedCards[editingIdx] = { ...modalData, pixRate, debitRate, maxParc, rates };

                setTenantData({ ...tenantData, cards_data: updatedCards });
                setEditingIdx(null);

                                                <button 
                                                    onClick={restoreCurrentDefault}
                                                    className="text-[9px] text-zinc-500 hover:text-emerald-400 font-bold uppercase tracking-widest transition-colors"
                                                >
                                                    Restaurar padrão
                                                </button>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3 max-h-[300px] overflow-y-auto pr-1">
                                                {modalRates.map((item, idx) => {
                                                    const isStringInstallment = typeof item.installment === 'string';
                                                    if (!isStringInstallment && item.installment > modalData.maxParc) return null;
                                                    
                                                    return (
                                                        <div key={idx} className="bg-black/30 border border-white/5 rounded-xl p-3 flex flex-col gap-1">
                                                            <span className="text-[9px] font-black text-zinc-500 uppercase tracking-widest">
                                                                {item.installment}
                                                            </span>
                                                            <div className="relative">
                                                                <input 
                                                                    type="text"
                                                                    value={item.percentStr}
                                                                    onChange={(e) => handlePercentChange(idx, e.target.value)}
                                                                    className="w-full h-9 bg-black/20 border border-white/5 rounded-lg px-2 text-xs font-mono text-white text-right pr-6 focus:outline-none focus:border-emerald-500"
                                                                />
                                                                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-zinc-500 font-mono">%</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-4 border-t border-white/5 shrink-0 flex gap-3">
                                        <button 
                                            onClick={deleteCurrent}
                                            className="h-11 px-4 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-xl text-xs uppercase font-black tracking-wider transition-all"
                                        >
                                            Excluir Bandeira
                                        </button>
                                        <button 
                                            onClick={() => { setEditingIdx(null); setModalData(null); }}
                                            className="flex-1 h-11 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-xs uppercase font-black tracking-wider text-zinc-400 transition-all"
                                        >
                                            Cancelar
                                        </button>
                                        <button 
                                            onClick={saveCurrent}
                                            className="flex-1 h-11 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs uppercase font-black tracking-wider transition-all font-bold"
                                        >
                                            Confirmar
                                        </button>
                                    </div>

                                </div>
                            </div>
                        )}

                        <DevFooter />
                    </div>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
