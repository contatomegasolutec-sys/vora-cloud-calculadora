            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                    return true;
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    return successful;
                }
            } catch (err) {
                console.error('Falha ao copiar:', err);
                return false;

        const parseBrazilianCurrency = (str) => {
            if (!str) return 0;
            let cleaned = str.toString().trim();
            cleaned = cleaned.replace(/\s/g, '');
            if (cleaned.includes(',')) {
                cleaned = cleaned.replace(/\./g, '').replace(',', '.');
            } else {
                const dotCount = (cleaned.match(/\./g) || []).length;
                if (dotCount === 1) {
                    const parts = cleaned.split('.');
                    if (parts[1].length === 2 || parts[1].length === 1) {
                        cleaned = cleaned;
                    } else {
                        cleaned = cleaned.replace(/\./g, '');
                    }
                } else {
                    cleaned = cleaned.replace(/\./g, '');
                }
            }
            return parseFloat(cleaned) || 0;
        };

        const CurrencyInput = ({ value, onChange, className, placeholder, style }) => {
            const [focused, setFocused] = useState(false);
            const [tempValue, setTempValue] = useState('');

            useEffect(() => {
                if (!focused) {
                    if (value === 0 || value === undefined || value === null || isNaN(value)) {
                        setTempValue('');
                    } else {
                        setTempValue(value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
                    }
                }
            }, [value, focused]);

            const handleFocus = () => {
                setFocused(true);
                if (value !== 0 && value !== undefined && value !== null && !isNaN(value)) {
                    const hasDecimals = value % 1 !== 0;
                    if (hasDecimals) {
                        setTempValue(value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).replace(/\./g, ''));
                    } else {
                        setTempValue(value.toString());
                    }
                } else {
                    setTempValue('');
                }
            };

            const handleBlur = () => {
                setFocused(false);
                let numVal = parseBrazilianCurrency(tempValue);
                onChange(numVal);
            };

            const handleChange = (e) => {
                setTempValue(e.target.value);
                let numVal = parseBrazilianCurrency(e.target.value);
                onChange(numVal);
            };

            return (
                <input
                    type="text"
                    value={tempValue}
                    onFocus={handleFocus}
                    onBlur={handleBlur}
                    onChange={handleChange}
                    className={className}
                    placeholder={placeholder}
                    style={style}
                />
            );

                updateWidth();
                
                const observer = new ResizeObserver(updateWidth);
                observer.observe(sliderRef.current);

                setModalRates(updated);

                        return updated;

                updatePayment(paymentId, { amount: remaining });

            const copyFullSummary = async () => {

                        const parcVal = total / installment;
                        
                        let details = [];
                        details.push(`${installment}x de R$ ${parcVal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                        if (copySettings.receiptTx && rate > 0) {
                            details.push(`Taxa: ${rate.toString().replace('.', ',')}%`);
                        }
                        if (copySettings.receiptTotal) {
                            details.push(`Total cobrado: R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                        }
                        const detailsStr = details.length > 0 ? ` (${details.join(' | ')})` : '';
                        lines.push(`${num}. Crédito (${card.name} ${installment}x): R$ ${amt.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}${detailsStr}`);
                    }
                });
                
                const troca = isTrocaEnabled ? parseFloat(trocaValue) || 0 : 0;
                const totalPaid = troca + multiplePayments.reduce((sum, p) => sum + (p.amount || 0), 0);
                
                lines.push('');
                lines.push(`Total Pago: R$ ${totalPaid.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                
                if (totalPaid >= amount) {
                    const troco = totalPaid - amount;
                    lines.push(`Troco: R$ ${troco.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                } else {
                    const restante = amount - totalPaid;
                    lines.push(`Saldo Restante: R$ ${restante.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                }
                lines.push('-----------------------------');
                
                await handleCopy(lines.join('\n'), id);
            };

            const handleCopy = async (text, id) => {
                const success = await copyToClipboard(text);
                if (success) {
                    setCopiedStates(prev => ({ ...prev, [id]: true }));
                    setTimeout(() => setCopiedStates(prev => ({ ...prev, [id]: false })), 2000);
                }
            };

            const generateRowText = (rate, total, installment, parcVal) => {
                const parcFormatted = parcVal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                const totalFormatted = total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                
                const label = typeof installment === 'number' 
                    ? `${installment}x de R$ ${parcFormatted}` 
                    : `${installment}: R$ ${parcFormatted}`;
                
                let parts = [label];
                if (copySettings.tx && rate > 0) parts.push(`Taxa: ${rate}%`);
                if (copySettings.total) parts.push(`Total: R$ ${totalFormatted}`);
                
                return parts.join(' | ');
            };

            const copyRow = async (rate, total, installment, parcVal, id) => {
                await handleCopy(generateRowText(rate, total, installment, parcVal), id);
            };

            const copyTable = async (card, id) => {
                let lines = [`Bandeira: ${card.name}`];
                
                if (copySettings.copyPix) {
                    const pixRate = card.pixRate !== undefined ? card.pixRate : 0;
                    const pixTotal = calculateTotal(amount, pixRate);
                    lines.push(generateRowText(pixRate, pixTotal, 'Pix', pixTotal));
                }
                
                if (copySettings.copyDebit) {
                    const debitRate = card.debitRate !== undefined ? card.debitRate : 0;
                    const debitTotal = calculateTotal(amount, debitRate);
                    lines.push(generateRowText(debitRate, debitTotal, 'Débito', debitTotal));
                }
                
                card.rates.slice(0, card.maxParc).forEach((rate, i) => {
                    const valTotal = calculateTotal(amount, rate);
                    if (rate > 0 || valTotal > 0) {
                        const parcVal = valTotal / (i + 1);
                        lines.push(generateRowText(rate, valTotal, i + 1, parcVal));
                    }
                });
                await handleCopy(lines.join('\n'), id);
            };

            const calculateTotal = (val, rate) => {
                if (rate >= 100) return 0;
                return (val * 100) / (100 - rate);
            };

            // Loading state
            if (tenantLoading) {
                return (
                    <div className="flex-1 flex flex-col justify-center items-center bg-zinc-950 p-4 min-h-screen">
                        <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-emerald-500 border-r-2 border-zinc-700" />
                        <span className="text-xs text-zinc-500 font-bold uppercase tracking-widest pt-4">Carregando...</span>
                    </div>
                );
            }

            // Error state / Block state
            if (tenantError) {
                return (
                    <div className="flex-1 flex flex-col justify-center items-center bg-zinc-950 p-4 text-center min-h-screen">
                        <div className="bg-red-500/10 border border-red-500/20 text-red-400 p-8 rounded-[2.5rem] max-w-md space-y-4">
                            <span className="font-headline font-black uppercase text-base block">⚠️ Acesso Indisponível</span>
                            <p className="text-xs text-zinc-400 leading-relaxed">{tenantError}</p>
                        </div>
                    </div>
                );
            }

            // Se o usuário não estiver logado, renderizar tela de login
            if (!user) {
                const isPartner = tenant !== null;
                const displayLogo = brandLogoImage ? (
                    <img src={brandLogoImage} alt="Logo" className="w-full h-full object-cover" />
                ) : isPartner ? (
                    <span className="font-headline font-black text-white italic text-2xl uppercase">
                        {brandLogoText || 'T'}
                    </span>
                ) : (
                    <img src="icon-192.png" alt="Logo Vora" className="w-full h-full object-cover" />
                );

                return (
                    <div className="flex-1 flex flex-col justify-center items-center p-4 md:p-8 min-h-screen bg-zinc-950 text-zinc-100">
                        <div className="w-full max-w-md bg-zinc-900 border border-white/5 rounded-[2.5rem] p-8 shadow-2xl space-y-6 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl -z-10" />
                            <div className="absolute bottom-0 left-0 w-64 h-64 bg-emerald-700/5 rounded-full blur-3xl -z-10" />
                            
                            <div className="text-center space-y-3">
                                <div className="mx-auto bg-[#004d1a] h-16 w-16 rounded-2xl flex items-center justify-center shadow-xl overflow-hidden mb-2">
                                    {displayLogo}
                                </div>
                                <h2 className="font-headline font-black uppercase tracking-tight text-white text-xl md:text-2xl">{brandName || 'VORA CLOUD'}</h2>
                                <p className="text-xs text-zinc-500 uppercase tracking-widest font-bold">{brandPhrase || 'Calculadora de Taxas Inteligentes'}</p>
                                
                                <div className="pt-3 border-t border-white/5 mt-4">
                                    <h3 className="font-headline font-black text-xs uppercase text-zinc-400 leading-tight">
                                        Seja bem-vindo
                                    </h3>
                                </div>
                            </div>

                            {isConfiguringSupabase ? (
                                <form onSubmit={saveSupabaseConfig} className="space-y-4 pt-4">
                                    <div className="flex justify-between items-center pb-2 border-b border-white/5">
                                        <h3 className="text-xs font-black uppercase tracking-wider text-white">Configurar Supabase</h3>
                                        <button type="button" onClick={() => setIsConfiguringSupabase(false)} className="text-[10px] font-black uppercase text-zinc-400 hover:text-white transition-colors">Voltar</button>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">URL do Projeto</label>
                                        <input
                                            type="text"
                                            required
                                            value={configUrl}
                                            onChange={(e) => setConfigUrl(e.target.value)}
                                            className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                            placeholder="https://xxxx.supabase.co"
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">Anon Key / API Key</label>
                                        <input
                                            type="password"
                                            required
                                            value={configAnonKey}
                                            onChange={(e) => setConfigAnonKey(e.target.value)}
                                            className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                            placeholder="Insira a Anon Key"
                                        />
                                    </div>
                                    <button type="submit" className="w-full h-12 rounded-2xl text-xs uppercase font-black tracking-widest bg-emerald-600 hover:bg-emerald-700 text-white transition-all shadow-lg font-bold">
                                        Salvar Conexão
                                    </button>
                                </form>
                            ) : (
                                <form onSubmit={handleLogin} className="space-y-4 pt-4">
                                    {authError && (
                                        <div className="p-3.5 bg-red-950/30 border border-red-900/40 rounded-xl text-red-400 text-xs font-bold text-center">
                                            {authError}
                                        </div>
                                    )}
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">Seu Nome</label>
                                        <input
                                            type="text"
                                            required
                                            value={loginName}
                                            onChange={(e) => setLoginName(e.target.value)}
                                            className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                            placeholder="Ex: João Silva"
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">Telefone (Whatsapp)</label>
                                        <input
                                            type="text"
                                            required
                                            value={loginPhone}
                                            onChange={(e) => setLoginPhone(e.target.value)}
                                            className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                            placeholder="Ex: 11999999999"
                                        />
                                    </div>
                                    <button 
                                        type="submit" 
                                        disabled={authLoading}
                                        className="w-full h-12 rounded-2xl text-xs uppercase font-black tracking-widest bg-emerald-600 hover:bg-emerald-700 text-white transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50 font-bold"
                                    >
                                        {authLoading ? "Entrando..." : "Entrar / Cadastrar"}
                                    </button>
                                </form>
                            )}
                        </div>
                        <DevFooter tenant={tenant} />
                    </div>
                );
            }

            // Renderização do gestor removida desta calculadora

            return (
                <div className={`flex-1 flex flex-col p-4 md:p-8 mx-auto w-full space-y-6 ${isMultipleMode ? 'max-w-full' : 'max-w-[1600px]'}`}>

                    <div className="flex justify-between items-center shrink-0 pb-2 border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#004d1a] h-10 w-10 rounded-xl flex items-center justify-center font-headline font-black text-white italic text-lg shadow-lg overflow-hidden uppercase">

                                    <img src={brandLogoImage} alt="Logo" className="w-full h-full object-cover" />

                            <div>

                            </div>

                        <div className="flex items-center gap-1.5 sm:gap-2">
                            <div className="flex items-center gap-1 text-emerald-400 bg-emerald-500/10 px-2 sm:px-3 py-1 sm:py-1.5 rounded-full border border-emerald-500/10 shrink-0">
                                <CloudIcon />
                                <span className="text-[9px] font-black uppercase tracking-wider">
                                    {user ? (
                                        <>
                                            <span className="hidden sm:inline">Olá, {user.name}</span>
                                            <span className="inline sm:hidden">{user.name.split(' ')[0]}</span>
                                        </>
                                    ) : (
                                        <>
                                            <span className="hidden sm:inline">Nuvem Ativa</span>
                                            <span className="inline sm:hidden">Nuvem</span>
                                        </>
                                    )}
                                </span>
                            </div>
                            <button 
                                onClick={handleLogout} 
                                className="text-[9px] font-black uppercase tracking-wider bg-red-500/20 text-red-300 hover:bg-red-500/30 border border-red-500/20 px-2 sm:px-3 py-1 sm:py-1.5 rounded-full transition-all shrink-0"
                            >
                                Sair
                            </button>
                        </div>
                    </div>

                    <div className={`bg-[#004d1a] ${isMultipleMode ? 'p-3 md:p-5 rounded-[1.5rem] gap-4' : 'p-4 md:p-8 rounded-[2rem] gap-6'} border border-white/5 flex flex-col justify-between shadow-2xl relative z-10 shrink-0 text-center ${isMultipleMode ? 'items-stretch w-full' : 'items-center'}`}>
                        <div className="flex justify-between items-center w-full gap-2 sm:gap-4">
                            {!isMultipleMode && tenant ? (
                                <div className="w-12 h-12 shrink-0" />
                            ) : (
                                <button 
                                    onClick={isMultipleMode ? () => setIsMultipleMode(false) : addColumn} 
                                    className={`bg-white/10 text-white hover:bg-white/20 rounded-xl shrink-0 border border-white/10 shadow-inner flex items-center justify-center transition-all ${isMultipleMode ? 'h-10 px-2 sm:px-4 gap-1 text-[9px] sm:text-[10px] font-black uppercase tracking-wider' : 'h-12 w-12 rounded-2xl'}`} 
                                    title={isMultipleMode ? "Voltar para Calculadora Simples" : "Adicionar Bandeira"}
                                >
                                    {isMultipleMode ? (
                                        <>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5 stroke-[3] shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                                            </svg>
                                            <div className="flex flex-col text-left leading-[1.1]">
                                                <span>Pagamento</span>
                                                <span>Único</span>
                                            </div>
                                        </>
                                    ) : (
                                        <PlusIcon className="" />
                                    )}
                                </button>
                            )}

                            <h2 className={`font-headline font-black uppercase italic tracking-wider text-white px-1 sm:px-2 flex-1 text-center ${isMultipleMode ? 'text-[9px] sm:text-xs md:text-base whitespace-normal sm:whitespace-nowrap leading-none' : 'text-xs sm:text-sm md:text-xl whitespace-nowrap'}`}>
                                {isMultipleMode ? (
                                    <>
                                        <span className="hidden sm:inline">MÚLTIPLOS PAGAMENTOS ATIVADO</span>
                                        <span className="inline sm:hidden">Múltiplos<br/>Pagamentos<br/>Ativado</span>
                                    </>
                                ) : (
                                    <>
                                        <span className="hidden sm:inline">VALOR A RECEBER</span>
                                        <span className="inline sm:hidden">A Receber</span>
                                    </>
                                )}
                            </h2>

                            <button onClick={() => setIsGlobalSettingsOpen(true)} className={`bg-white/10 text-white hover:bg-white/20 rounded-xl shrink-0 border border-white/10 shadow-inner flex items-center justify-center transition-all ${isMultipleMode ? 'h-10 w-10' : 'h-12 w-12 rounded-2xl'}`} title="Configurações">
                                <SettingsIcon className={isMultipleMode ? "h-4 w-4" : ""} />
                            </button>
                        </div>

                        {!isMultipleMode ? (
                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full max-w-xl mx-auto">
                                <div className="relative flex-1 w-full">
                                    <span className="absolute left-6 top-1/2 -translate-y-1/2 text-[#004d1a]/40 font-black text-xl sm:text-2xl">R$</span>
                                    <CurrencyInput
                                        placeholder="0,00"
                                        className="h-16 sm:h-20 w-full pl-16 pr-6 bg-white border-4 border-white/10 text-2xl sm:text-3xl md:text-4xl font-black text-[#004d1a] text-center shadow-inner focus:outline-none rounded-[1.25rem] sm:rounded-[1.5rem]"
                                        value={amount}
                                        onChange={setAmount}
                                    />
                                </div>
                                <button 
                                    onClick={() => {
                                        setIsMultipleMode(true);
                                        setMultiplePayments([
                                            { id: Date.now(), amount: 0, type: 'cartao', brandIdx: 0, selectedOption: 1 }
                                        ]);
                                    }}
                                    className="h-16 sm:h-20 px-6 bg-white/10 hover:bg-white/20 text-white font-headline font-black rounded-[1.25rem] sm:rounded-[1.5rem] border border-white/10 flex items-center justify-center text-xs uppercase tracking-widest transition-all shrink-0"
                                >
                                    Multi-pagamentos
                                </button>
                            </div>
                        ) : (
                                 <div className="w-full max-w-5xl lg:max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-10 gap-6 items-stretch">
                                {/* O Cartão de Resumo de Vendas estilo Segunda Imagem */}
                                <div className="relative bg-[#f8faf9] text-zinc-800 rounded-[2.5rem] p-6 md:p-8 shadow-2xl text-left border border-zinc-200/60 flex flex-col gap-4 animate-in zoom-in-95 duration-200 h-full lg:col-span-7">


                                    {/* Linha 1: Total da Venda */}
                                    <div className="flex justify-between items-center text-sm font-bold uppercase tracking-wider text-zinc-500">
                                        <span>Total da Venda:</span>
                                         <div className="relative flex items-center">
                                             <span className="text-zinc-600 mr-1.5 font-mono text-base font-black">R$</span>
                                             <CurrencyInput
                                                 value={amount}
                                                 onChange={setAmount}
                                                 placeholder="0,00"
                                                 className="w-36 h-9 text-right font-black font-mono bg-transparent border-b-2 border-zinc-300 focus:border-[#004d1a] focus:outline-none text-zinc-700 text-lg"
                                             />
                                        </div>
                                    </div>

                                    {/* Linha Divisória */}
                                    <div className="border-t border-dashed border-zinc-300 my-1" />

                                    {/* Deduções */}
                                    <div className="flex flex-col gap-3.5">
                                        {/* Crédito da Troca */}
                                        {isTrocaEnabled && (
                                            <div className="flex justify-between items-center w-full text-xs font-bold text-amber-600">
                                                 <span>
                                                     CRÉDITO DA TROCA: <span className="text-[10px] text-zinc-400 font-normal">({trocaClient})</span>
                                                 </span>
                                                 <span className="font-mono font-black text-sm md:text-base whitespace-nowrap">
                                                     - R$ {parseFloat(trocaValue || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                 </span>
                                             </div>
                                        )}

                                        {/* Pagamentos */}
                                        {multiplePayments.map((p, i) => {
                                            const card = data[p.brandIdx] || data[0] || { name: 'Sem Bandeira', pixRate: 0, debitRate: 0, rates: [] };
                                            let typeLabel = '';
                                            if (p.selectedOption === 'pix') typeLabel = `VIA PIX`;
                                            else if (p.selectedOption === 'debito') typeLabel = `VIA DÉBITO (${card.name})`;
                                            else if (p.selectedOption === 'dinheiro') typeLabel = `VIA DINHEIRO`;
                                            else if (p.selectedOption === 'fixo') typeLabel = `VIA TROCA (VALOR FIXO)`;
                                            else typeLabel = `VIA CARTÃO CRÉDITO (${card.name} ${p.selectedOption}x)`;

                                            return (
                                                <div key={p.id} className="border-b border-zinc-200/40 pb-2 last:border-0 last:pb-0">
                                                    <div className="flex justify-between items-center w-full text-xs font-bold text-blue-600">
                                                        <span>{i + 1} - {typeLabel}:</span>
                                                        <span className="font-mono font-black text-sm md:text-base whitespace-nowrap">
                                                            - R$ {(p.amount || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                        </span>
                                                    </div>
                                                    {(() => {
                                                        if (p.selectedOption === 'dinheiro' || p.selectedOption === 'fixo') return null;
                                                        
                                                        let rate = 0;
                                                        let installmentLabel = '';
                                                        
                                                        if (p.selectedOption === 'pix') {
                                                            rate = card.pixRate !== undefined ? card.pixRate : 0;
                                                            installmentLabel = 'Pix';
                                                        } else if (p.selectedOption === 'debito') {
                                                            rate = card.debitRate !== undefined ? card.debitRate : 0;
                                                            installmentLabel = 'Débito';
                                                        } else {
                                                            const installment = parseInt(p.selectedOption) || 1;
                                                            rate = card.rates[installment - 1] || 0;
                                                            installmentLabel = `${installment}x`;
                                                        }
                                                        
                                                        const totalToCharge = calculateTotal(p.amount || 0, rate);
                                                        const totalFormatted = totalToCharge.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                                                        
                                                        let text = '';
                                                        if (p.selectedOption !== 'pix' && p.selectedOption !== 'debito') {
                                                            const installment = parseInt(p.selectedOption) || 1;
                                                            const parcVal = totalToCharge / installment;
                                                            const parcFormatted = parcVal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                                                            text = `${installment}x de R$ ${parcFormatted} - Total: R$ ${totalFormatted}`;
                                                        } else {
                                                            text = `${installmentLabel} - Total: R$ ${totalFormatted}`;
                                                        }

                                                        return (
                                                             <div className="text-[10px] font-semibold text-zinc-500 mt-0.5 flex flex-col items-start text-left">
                                                                 <span className="uppercase tracking-wider">Passar na Maquininha:</span>
                                                                 <span className="font-mono font-bold text-zinc-700 text-xs">
                                                                     {text}
                                                                 </span>
                                                             </div>
                                                        );
                                                    })()}
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Linha Divisória */}
                                    <div className="border-t border-zinc-300 my-1" />

                                    {/* Saldo Restante / Troco */}
                                    {(() => {
                                        const troca = isTrocaEnabled ? parseFloat(trocaValue) || 0 : 0;
                                        const totalPaid = troca + multiplePayments.reduce((sum, p) => sum + (p.amount || 0), 0);
                                        const diff = amount - totalPaid;
                                        const isOver = diff < 0;
                                        const absDiff = Math.abs(diff);

                                        return (
                                            <div className="flex justify-between items-end mt-2">
                                                <span className="text-xs font-black uppercase tracking-wider text-emerald-600 mb-1">
                                                    {isOver ? 'Troco:' : 'Saldo Restante:'}
                                                </span>
                                                <span className="text-3xl font-black font-mono text-emerald-600 leading-none">
                                                    R$ {absDiff.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                </span>
                                            </div>
                                        );
                                    })()}
                                </div>
                                    {/* Configurações adicionais de troca e modo */}
                                    <div className="flex flex-col justify-between gap-4 h-full text-left lg:col-span-3">
                                        {/* Card da Troca */}
                                        <div className="bg-black/20 border border-white/5 rounded-[1.5rem] p-4 flex flex-col gap-4">
                                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                                {/* Troca Toggle */}
                                                <div className="flex items-center gap-3">
                                                    <button 
                                                        onClick={() => setIsTrocaEnabled(!isTrocaEnabled)} 
                                                        className={`w-11 h-6 flex items-center rounded-full p-0.5 transition-all shrink-0 ${isTrocaEnabled ? 'bg-amber-600' : 'bg-zinc-800'}`}
                                                    >
                                                        <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${isTrocaEnabled ? 'translate-x-5' : 'translate-x-0'}`} />
                                                    </button>
                                                    <div>

                                                                                <td className="px-3 py-3 font-mono text-xs font-bold text-zinc-200 text-right pr-2 whitespace-nowrap">
                                                                                    R$ {payment.amount > 0 ? pixTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0,00'}
                                                                                </td>
                                                                                <td className="px-2 py-3 text-center">
                                                                                    <div className="flex items-center justify-center">
                                                                                        {isSelected ? (
                                                                                            <div className="h-5 w-5 rounded-full bg-emerald-500 flex items-center justify-center text-white shadow-lg shadow-emerald-950/20">
                                                                                                <svg className="w-3 h-3 stroke-[3]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                                                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                                                                                </svg>
                                                                                            </div>
                                                                                        ) : (
                                                                                            <div className="h-5 w-5 rounded-full border border-white/20 hover:border-emerald-500 transition-colors" />
                                                                                        )}
                                                                                    </div>
                                                                                </td>
                                                                            </tr>
                                                                        );
                                                                    })()}
                                                                    {copySettings.showDebit && (() => {
                                                                        const isSelected = payment.selectedOption === 'debito';
                                                                        return (
                                                                            <tr 
                                                                                onClick={(e) => handleRowClick(e, 'debito')}
                                                                                className={`cursor-pointer transition-colors group border-b border-white/5 ${isSelected ? 'bg-emerald-500/10 border-l-4 border-l-emerald-500 font-bold' : 'hover:bg-white/[0.02] bg-white/[0.01]'}`}
                                                                            >
                                                                                <td className="px-3 py-3">
                                                                                    <button onClick={() => copyRow(debitRate, debitTotal, 'Débito', debitTotal, debitRowId)} className="h-7 w-7 text-zinc-400 hover:text-white hover:bg-white/10 rounded-xl transition-all flex items-center justify-center" title="Copiar Linha">
                                                                                        {copiedStates[debitRowId] ? <CheckIcon /> : <CopyIcon />}
                                                                                    </button>
                                                                                </td>
                                                                                <td className="px-1 py-3 font-mono text-xs text-zinc-400 font-semibold text-center">
                                                                                    <div>{debitRate > 0 ? debitRate : 0}%</div>
                                                                                    <div className="text-[9px] text-zinc-600 font-normal">{(1 - debitRate / 100).toFixed(3).replace('.', ',')}</div>
                                                                                </td>
                                                                                <td className="px-3 py-3 font-black text-[10px] text-emerald-500/80 text-center uppercase whitespace-nowrap">Débito</td>
                                                                                <td className="px-3 py-3 font-mono text-xs font-black text-emerald-500 text-right whitespace-nowrap">
                                                                                    R$ {payment.amount > 0 ? debitTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0,00'}
                                                                                </td>
                                                                                <td className="px-3 py-3 font-mono text-xs font-bold text-zinc-200 text-right pr-2 whitespace-nowrap">
                                                                                    R$ {payment.amount > 0 ? debitTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0,00'}
                                                                                </td>
                                                                                <td className="px-2 py-3 text-center">
                                                                                    <div className="flex items-center justify-center">
                                                                                        {isSelected ? (
                                                                                            <div className="h-5 w-5 rounded-full bg-emerald-500 flex items-center justify-center text-white shadow-lg shadow-emerald-950/20">
                                                                                                <svg className="w-3 h-3 stroke-[3]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                                                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                                                                                </svg>
                                                                                            </div>
                                                                                        ) : (
                                                                                            <div className="h-5 w-5 rounded-full border border-white/20 hover:border-emerald-500 transition-colors" />
                                                                                        )}
                                                                                    </div>
                                                                                </td>
                                                                            </tr>
                                                                        );
                                                                    })()}
                                                                    {creditRows}
                                                                </>
                                                            );
                                                        }

                                                        let rate = 0;
                                                        let label = '';
                                                        let isFixo = false;

                                                        if (payment.type === 'debito') {
                                                            rate = card.debitRate !== undefined ? card.debitRate : 0;
                                                            label = 'Débito';
                                                        } else if (payment.type === 'pix') {
                                                            rate = card.pixRate !== undefined ? card.pixRate : 0;
                                                            label = 'Pix';
                                                        } else if (payment.type === 'dinheiro') {
                                                            rate = 0;
                                                            label = 'Dinheiro';
                                                        } else if (payment.type === 'fixo') {
                                                            rate = 0;
                                                            label = 'Fixo';
                                                            isFixo = true;
                                                        }

                                                        const total = isFixo ? payment.amount : calculateTotal(payment.amount, rate);
                                                        const rowId = `pay-row-${payment.id}-single`;

                                                        return (
                                                            <tr className="bg-emerald-500/10 border-l-4 border-l-emerald-500 font-bold transition-colors">
                                                                <td className="px-3 py-3">
                                                                    <button 
                                                                        onClick={async () => {
                                                                            if (isFixo) {
                                                                                await handleCopy(`Valor Fixo: R$ ${payment.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`, rowId);
                                                                            } else {
                                                                                await copyRow(rate, total, label, total, rowId);
                                                                            }
                                                                        }} 
                                                                        className="h-7 w-7 text-zinc-400 hover:text-white hover:bg-white/10 rounded-xl transition-all flex items-center justify-center" 
                                                                        title="Copiar Linha"
                                                                    >
                                                                        {copiedStates[rowId] ? <CheckIcon /> : <CopyIcon />}
                                                                    </button>
                                                                </td>
                                                                <td className="px-1 py-3 font-mono text-xs text-zinc-400 font-semibold text-center">
                                                                    {isFixo ? (
                                                                        <div className="text-[10px] font-bold text-zinc-500 uppercase">Troca</div>
                                                                    ) : (
                                                                        <>
                                                                            <div>{rate > 0 ? rate : 0}%</div>
                                                                            <div className="text-[9px] text-zinc-600 font-normal">{(1 - rate / 100).toFixed(3).replace('.', ',')}</div>
                                                                        </>
                                                                    )}
                                                                </td>
                                                                <td className="px-3 py-3 font-bold text-[10px] text-zinc-400 text-center uppercase whitespace-nowrap">{label}</td>
                                                                <td className="px-3 py-3 font-mono text-xs font-black text-emerald-500 text-right whitespace-nowrap">
                                                                    R$ {payment.amount > 0 ? total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0,00'}
                                                                </td>
                                                                <td className="px-3 py-3 font-mono text-xs font-bold text-zinc-200 text-right pr-2 whitespace-nowrap">
                                                                    R$ {payment.amount > 0 ? total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0,00'}
                                                                </td>
                                                                <td className="px-2 py-3 text-center">
                                                                    <div className="flex items-center justify-center">
                                                                        <div className="h-5 w-5 rounded-full bg-emerald-500 flex items-center justify-center text-white shadow-lg shadow-emerald-950/20">
                                                                            <svg className="w-3 h-3 stroke-[3]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                                <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                                                            </svg>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })()}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>

                    {/* Modal de Edição */}
                    {editingIdx !== null && modalData && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="w-full max-w-sm bg-zinc-900 border border-white/10 rounded-[2rem] p-6 shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
                                <div className="flex justify-between items-center pb-4 border-b border-white/5 mb-4 shrink-0">
                                    <h4 className="font-headline font-black text-base uppercase text-white">Editar Bandeira</h4>
                                    <span className="text-[8px] font-black tracking-widest bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded-full">CONFIG</span>
                                </div>

                                <div className="space-y-4 overflow-y-auto flex-1 pr-1 pb-4">
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[10px] font-black tracking-widest uppercase block">Nome da Bandeira</label>
                                        <input
                                            type="text"
                                            value={modalData.name}
                                            onChange={(e) => setModalData({ ...modalData, name: e.target.value })}
                                            className="w-full h-12 border-2 border-white/5 bg-white/5 font-bold text-sm px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-zinc-500 text-[10px] font-black tracking-widest uppercase block">Cor do Card</label>
                                            <input
                                                type="color"
                                                value={modalData.color}
                                                onChange={(e) => setModalData({ ...modalData, color: e.target.value })}
                                                className="h-12 w-full p-1 cursor-pointer border-2 border-white/5 bg-white/5 rounded-xl"
                                            />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-zinc-500 text-[10px] font-black tracking-widest uppercase block">Máx Parcelas (1-24)</label>
                                            <input
                                                type="number"
                                                min={1}
                                                max={24}
                                                value={modalData.maxParc}
                                                onChange={(e) => setModalData({ ...modalData, maxParc: parseInt(e.target.value) || 1 })}
                                                className="w-full h-12 text-center font-bold font-mono border-2 border-white/5 bg-white/5 rounded-xl text-white focus:outline-none focus:border-emerald-500 text-sm"
                                            />
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center">
                                            <label className="text-zinc-500 text-[10px] font-black tracking-widest uppercase">Taxas e Coeficientes por Parcela</label>
                                            <button className="text-[8px] hover:text-emerald-500 transition-colors uppercase font-black tracking-widest flex items-center gap-1" onClick={restoreCurrentDefault}>
                                                <UndoIcon /> Restaurar Padrão
                                            </button>
                                        </div>
                                        <div className="flex px-3 text-[9px] font-black tracking-widest text-zinc-500 uppercase">
                                            <span className="w-10">Parc.</span>
                                            <span className="flex-1 text-center">Taxa (%)</span>
                                            <span className="flex-1 text-center">Coeficiente</span>
                                        </div>
                                        <div className="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                                            {modalRates.filter(item => {
                                                if (item.installment === 'PIX' || item.installment === 'DÉBITO') return true;
                                                return parseInt(item.installment) <= modalData.maxParc;
                                            }).map((item) => {
                                                const originalIndex = modalRates.indexOf(item);
                                                return (
                                                    <div key={item.installment} className="flex items-center gap-3 bg-white/5 border border-white/5 rounded-xl p-2 px-3">
                                                        <span className="text-[10px] font-black text-zinc-400 w-10">
                                                            {item.installment === 'DÉBITO' ? 'Débito' : `${item.installment}x`}
                                                        </span>
                                                        
                                                        {/* Percentage Input */}
                                                        <div className="flex-1 flex items-center gap-1 bg-white/5 rounded-lg px-2 border border-white/5 focus-within:border-emerald-500 transition-colors">
                                                            <input
                                                                type="text"
                                                                value={item.percentStr}
                                                                onChange={(e) => handlePercentChange(originalIndex, e.target.value)}
                                                                className="w-full h-8 text-center text-xs font-mono font-bold bg-transparent text-white focus:outline-none"
                                                                placeholder="0,00"
                                                            />
                                                            <span className="text-[10px] font-bold text-zinc-500">%</span>
                                                        </div>

                                                        {/* Coefficient Input */}
                                                        <div className="flex-1 flex items-center gap-1 bg-white/5 rounded-lg px-2 border border-white/5 focus-within:border-emerald-500 transition-colors">
                                                            <input
                                                                type="text"
                                                                value={item.coefStr}
                                                                onChange={(e) => handleCoefChange(originalIndex, e.target.value)}
                                                                className="w-full h-8 text-center text-xs font-mono font-bold bg-transparent text-white focus:outline-none"
                                                                placeholder="1,000"
                                                            />
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex items-center justify-between pt-4 border-t border-white/5 gap-3 shrink-0">
                                    <button onClick={deleteCurrent} className="h-12 w-12 hover:bg-red-600/10 text-red-500 border border-red-500/20 rounded-2xl flex items-center justify-center transition-all" title="Apagar Bandeira">
                                        <TrashIcon />
                                    </button>
                                    <div className="flex gap-2 flex-1">
                                        <button onClick={() => { setEditingIdx(null); setModalData(null); }} className="flex-1 h-12 rounded-2xl text-[10px] uppercase font-black tracking-widest text-zinc-400 bg-white/5 hover:bg-white/10 transition-all">
                                            Cancelar
                                        </button>
                                        <button onClick={saveCurrent} className="flex-1 h-12 rounded-2xl text-[10px] uppercase font-black tracking-widest bg-emerald-600 hover:bg-emerald-700 text-white transition-all shadow-lg shadow-emerald-950/20 border-t border-white/20">
                                            Salvar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal de Configurações Globais de Cópia */}
                    {isGlobalSettingsOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="w-full max-w-sm bg-zinc-900 border border-white/10 rounded-[2rem] p-6 shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
                                <div className="pb-4 border-b border-white/5 mb-4 shrink-0">
                                    <h4 className="font-headline font-black text-base uppercase text-white">Configurações</h4>
                                </div>

                                <div className="space-y-6 overflow-y-auto flex-1 pr-1 pb-4">
                                    <div className="space-y-4">
                                        <h5 className="text-zinc-500 text-[10px] font-black tracking-widest uppercase">Opções de Cópia</h5>
                                        <p className="text-zinc-500 text-[9px] font-medium tracking-wide">Quais dados devem ser copiados ao clipboard?</p>

                                        <div className="flex items-center justify-between bg-white/5 border border-white/5 rounded-2xl p-4 hover:border-emerald-500/30 transition-all cursor-pointer" onClick={() => toggleCopySetting('tx')}>
                                            <span className="text-xs font-bold uppercase tracking-wider text-zinc-200">Taxa (em %)</span>
                                            <div className={`w-12 h-7 flex items-center rounded-full p-1 transition-all ${copySettings.tx ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                                <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${copySettings.tx ? 'translate-x-5' : 'translate-x-0'}`} />
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between bg-white/5 border border-white/5 rounded-2xl p-4 hover:border-emerald-500/30 transition-all cursor-pointer" onClick={() => toggleCopySetting('total')}>
                                            <span className="text-xs font-bold uppercase tracking-wider text-zinc-200">Total das parcelas</span>
                                            <div className={`w-12 h-7 flex items-center rounded-full p-1 transition-all ${copySettings.total ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                                <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${copySettings.total ? 'translate-x-5' : 'translate-x-0'}`} />
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between bg-white/5 border border-white/5 rounded-2xl p-4 hover:border-emerald-500/30 transition-all cursor-pointer" onClick={() => toggleCopySetting('receiptTx')}>
                                            <span className="text-xs font-bold uppercase tracking-wider text-zinc-200">Exibir taxa no recibo</span>
                                            <div className={`w-12 h-7 flex items-center rounded-full p-1 transition-all ${copySettings.receiptTx ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                                <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${copySettings.receiptTx ? 'translate-x-5' : 'translate-x-0'}`} />
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between bg-white/5 border border-white/5 rounded-2xl p-4 hover:border-emerald-500/30 transition-all cursor-pointer" onClick={() => toggleCopySetting('receiptTotal')}>
                                            <span className="text-xs font-bold uppercase tracking-wider text-zinc-200">Exibir total cobrado no recibo</span>
                                            <div className={`w-12 h-7 flex items-center rounded-full p-1 transition-all ${copySettings.receiptTotal ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                                <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${copySettings.receiptTotal ? 'translate-x-5' : 'translate-x-0'}`} />
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between bg-white/5 border border-white/5 rounded-2xl p-4 hover:border-emerald-500/30 transition-all cursor-pointer" onClick={() => toggleCopySetting('showPix')}>
                                            <span className="text-xs font-bold uppercase tracking-wider text-zinc-200">Mostrar Pix na Calculadora</span>
                                            <div className={`w-12 h-7 flex items-center rounded-full p-1 transition-all ${copySettings.showPix ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                                <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${copySettings.showPix ? 'translate-x-5' : 'translate-x-0'}`} />
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between bg-white/5 border border-white/5 rounded-2xl p-4 hover:border-emerald-500/30 transition-all cursor-pointer" onClick={() => toggleCopySetting('showDebit')}>
                                            <span className="text-xs font-bold uppercase tracking-wider text-zinc-200">Mostrar Débito na Calculadora</span>
                                            <div className={`w-12 h-7 flex items-center rounded-full p-1 transition-all ${copySettings.showDebit ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                                <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${copySettings.showDebit ? 'translate-x-5' : 'translate-x-0'}`} />
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between bg-white/5 border border-white/5 rounded-2xl p-4 hover:border-emerald-500/30 transition-all cursor-pointer" onClick={() => toggleCopySetting('copyPix')}>
                                            <span className="text-xs font-bold uppercase tracking-wider text-zinc-200">Copiar Pix</span>
                                            <div className={`w-12 h-7 flex items-center rounded-full p-1 transition-all ${copySettings.copyPix ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                                <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${copySettings.copyPix ? 'translate-x-5' : 'translate-x-0'}`} />
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between bg-white/5 border border-white/5 rounded-2xl p-4 hover:border-emerald-500/30 transition-all cursor-pointer" onClick={() => toggleCopySetting('copyDebit')}>
                                            <span className="text-xs font-bold uppercase tracking-wider text-zinc-200">Copiar Débito</span>
                                            <div className={`w-12 h-7 flex items-center rounded-full p-1 transition-all ${copySettings.copyDebit ? 'bg-emerald-600' : 'bg-zinc-800'}`}>
                                                <div className={`bg-white w-5 h-5 rounded-full shadow-md transform transition-all ${copySettings.copyDebit ? 'translate-x-5' : 'translate-x-0'}`} />
                                            </div>
                                        </div>
                                    </div>

                                </div>

                                <div className="pt-4 border-t border-white/5 shrink-0">
                                    <button onClick={() => setIsGlobalSettingsOpen(false)} className="w-full h-12 rounded-2xl text-[10px] uppercase font-black tracking-widest bg-emerald-600 hover:bg-emerald-700 text-white transition-all shadow-lg border-t border-white/20">
                                        Concluir
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <DevFooter tenant={tenant} />
                    <ScrollTopButton />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker registrado:', reg.scope))
                    .catch((err) => console.error('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
