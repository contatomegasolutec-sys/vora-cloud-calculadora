<body class="h-full flex flex-col antialiased">
    
    <div id="root" class="h-full flex flex-col"></div>

    <!-- React Application Code -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom SVG Icons (Replacement for Lucide React)
        const PlusIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        );

        const SettingsIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );

        const TrashIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
        );

        const UndoIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        );

        const PencilIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        );

        const CopyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        );

        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        );

        const CloudIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.47 0-.89.09-1.24.26A7 7 0 1 0 3 16.06V16a4 4 0 0 0 4 4h10.5Z"/></svg>
        );

        const DEFAULT_RATES = {
            'VISA': [2.50, 3.68, 4.53, 5.38, 6.23, 7.08, 8.23, 9.08, 9.93, 10.78, 11.63, 12.48],
            'MasterCard': [2.50, 3.68, 4.53, 5.38, 6.23, 7.08, 8.23, 9.08, 9.93, 10.78, 11.63, 12.48],
            'ELO': [2.50, 3.68, 4.53, 5.38, 6.23, 7.08, 8.23, 9.08, 9.93, 10.78, 11.63, 12.48],
            'Hiper': [2.50, 3.68, 4.53, 5.38, 6.23, 7.08, 8.23, 9.08, 9.93, 10.78, 11.63, 12.48]
        };

        const makeRates = (base) => {
            const arr = new Array(24).fill(0);
            base.forEach((r, i) => arr[i] = r);
            return arr;
        };

        const getInitialDefaults = () => [
            { name: 'VISA', color: '#0d47a1', maxParc: 12, pixRate: 0, debitRate: 0, rates: makeRates(DEFAULT_RATES['VISA']) },
            { name: 'MasterCard', color: '#f57f17', maxParc: 12, pixRate: 0, debitRate: 0, rates: makeRates(DEFAULT_RATES['MasterCard']) },
            { name: 'ELO', color: '#000000', maxParc: 12, pixRate: 0, debitRate: 0, rates: makeRates(DEFAULT_RATES['ELO']) },
            { name: 'Hiper', color: '#c62828', maxParc: 12, pixRate: 0, debitRate: 0, rates: makeRates(DEFAULT_RATES['Hiper']) }
        ];

        // Auxiliary function to copy to clipboard
        const copyToClipboard = async (text) => {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                    return true;
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    return successful;
                }
            } catch (err) {
                console.error('Falha ao copiar:', err);
                return false;
            }
        };

        const parseBrazilianCurrency = (str) => {
            if (!str) return 0;
            let cleaned = str.toString().trim();
            cleaned = cleaned.replace(/\s/g, '');
            if (cleaned.includes(',')) {
                cleaned = cleaned.replace(/\./g, '').replace(',', '.');
            } else {
                const dotCount = (cleaned.match(/\./g) || []).length;
                if (dotCount === 1) {
                    const parts = cleaned.split('.');
                    if (parts[1].length === 2 || parts[1].length === 1) {
                        cleaned = cleaned;
                    } else {
                        cleaned = cleaned.replace(/\./g, '');
                    }
                } else {
                    cleaned = cleaned.replace(/\./g, '');
                }
            }
            return parseFloat(cleaned) || 0;
        };

        const CurrencyInput = ({ value, onChange, className, placeholder, style }) => {
            const [focused, setFocused] = useState(false);
            const [tempValue, setTempValue] = useState('');

            useEffect(() => {
                if (!focused) {
                    if (value === 0 || value === undefined || value === null || isNaN(value)) {
                        setTempValue('');
                    } else {
                        setTempValue(value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
                    }
                }
            }, [value, focused]);

            const handleFocus = () => {
                setFocused(true);
                if (value !== 0 && value !== undefined && value !== null && !isNaN(value)) {
                    const hasDecimals = value % 1 !== 0;
                    if (hasDecimals) {
                        setTempValue(value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).replace(/\./g, ''));
                    } else {
                        setTempValue(value.toString());
                    }
                } else {
                    setTempValue('');
                }
            };

            const handleBlur = () => {
                setFocused(false);
                let numVal = parseBrazilianCurrency(tempValue);
                onChange(numVal);
            };

            const handleChange = (e) => {
                setTempValue(e.target.value);
                let numVal = parseBrazilianCurrency(e.target.value);
                onChange(numVal);
            };

            return (
                <input
                    type="text"
                    value={tempValue}
                    onFocus={handleFocus}
                    onBlur={handleBlur}
                    onChange={handleChange}
                    className={className}
                    placeholder={placeholder}
                    style={style}
                />
            );
        };

        function App() {
            // Supabase and Authentication State
            const [supabaseConfig, setSupabaseConfig] = useState(() => {
                const saved = localStorage.getItem('vora_supabase_config');
                return saved ? JSON.parse(saved) : null;
            });
            const [supabase, setSupabase] = useState(null);
            const [user, setUser] = useState(() => {
                const saved = sessionStorage.getItem('vora_user');
                return saved ? JSON.parse(saved) : null;
            });

            // Login Form inputs
            const [loginName, setLoginName] = useState('');
            const [loginPhone, setLoginPhone] = useState('');
            const [authError, setAuthError] = useState('');
            const [authLoading, setAuthLoading] = useState(false);

            // Supabase Config Form inputs
            const [configUrl, setConfigUrl] = useState('https://gejpfozexjxajahgtusr.supabase.co');
            const [configAnonKey, setConfigAnonKey] = useState('');
            const [isConfiguringSupabase, setIsConfiguringSupabase] = useState(false);

            // Manager Panel State
            const [isManagerView, setIsManagerView] = useState(false);
            const [profilesList, setProfilesList] = useState([]);
            const [historyList, setHistoryList] = useState([]);
            const [selectedProfileRates, setSelectedProfileRates] = useState(null);
            const [managerSearch, setManagerSearch] = useState('');

            const [amount, setAmount] = useState(0);
            const [data, setData] = useState([]);
            const [editingIdx, setEditingIdx] = useState(null);
            const [modalData, setModalData] = useState(null);
            const [isGlobalSettingsOpen, setIsGlobalSettingsOpen] = useState(false);
            const [copySettings, setCopySettings] = useState({
                tx: true,
                total: true,
                showPix: true,
                showDebit: true,
                copyPix: true,
                copyDebit: true,
                receiptTx: true,
                receiptTotal: true
            });
            const [copiedStates, setCopiedStates] = useState({});
            const [modalRates, setModalRates] = useState([]);

            const [brandName, setBrandName] = useState('VORA CLOUD');
            const [brandPhrase, setBrandPhrase] = useState('Calculadora de Taxas Offline');
            const [brandLogoText, setBrandLogoText] = useState('V');
            const [brandLogoImage, setBrandLogoImage] = useState('');

            const [isMultipleMode, setIsMultipleMode] = useState(false);
            const [multiplePayments, setMultiplePayments] = useState([]);

            const [isTrocaEnabled, setIsTrocaEnabled] = useState(false);
            const [trocaClient, setTrocaClient] = useState('');
            const [trocaDevice, setTrocaDevice] = useState('');
            const [trocaValue, setTrocaValue] = useState(0);

            // Drag-to-scroll state and handlers
            const [isDragging, setIsDragging] = useState(false);
            const [startX, setStartX] = useState(0);
            const [scrollLeft, setScrollLeft] = useState(0);
            const sliderRef = React.useRef(null);
            const topScrollRef = React.useRef(null);
            const [scrollWidth, setScrollWidth] = useState(0);

            const isSyncingTop = React.useRef(false);
            const isSyncingBottom = React.useRef(false);

            const handleTopScroll = () => {
                if (isSyncingBottom.current) {
                    isSyncingBottom.current = false;
                    return;
                }
                if (topScrollRef.current && sliderRef.current) {
                    isSyncingTop.current = true;
                    sliderRef.current.scrollLeft = topScrollRef.current.scrollLeft;
                }
            };

            const handleBottomScroll = () => {
                if (isSyncingTop.current) {
                    isSyncingTop.current = false;
                    return;
                }
                if (sliderRef.current && topScrollRef.current) {
                    isSyncingBottom.current = true;
                    topScrollRef.current.scrollLeft = sliderRef.current.scrollLeft;
                }
            };

            const handleMouseDown = (e) => {
                if (e.button !== 0) return;
                if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select') || e.target.closest('a') || e.target.closest('svg')) return;
                
                if (sliderRef.current) {
                    const rect = sliderRef.current.getBoundingClientRect();
                    const isClickOnScrollbar = e.clientY > rect.top + sliderRef.current.clientHeight;
                    if (isClickOnScrollbar) return;
                }

                setIsDragging(true);
                setStartX(e.pageX - sliderRef.current.offsetLeft);
                setScrollLeft(sliderRef.current.scrollLeft);
            };

            const handleMouseLeave = () => {
                setIsDragging(false);
            };

            const handleMouseUp = () => {
                setIsDragging(false);
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - sliderRef.current.offsetLeft;
                const walk = (x - startX) * 1.5;
                sliderRef.current.scrollLeft = scrollLeft - walk;
            };

            useEffect(() => {
                if (!isMultipleMode || !sliderRef.current) return;
                
                const updateWidth = () => {
                    if (sliderRef.current) {
                        setScrollWidth(sliderRef.current.scrollWidth);
                    }
                };
                
                updateWidth();
                
                const observer = new ResizeObserver(updateWidth);
                observer.observe(sliderRef.current);
                
                const timer = setInterval(updateWidth, 500);
                
                return () => {
                    observer.disconnect();
                    clearInterval(timer);
                };
            }, [isMultipleMode, multiplePayments]);

            // Inicializar cliente do Supabase
            useEffect(() => {
                if (supabaseConfig) {
                    try {
                        const client = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);
                        setSupabase(client);
                    } catch (e) {
                        console.error("Erro ao inicializar cliente Supabase:", e);
                    }
                } else {
                    setSupabase(null);
                }
            }, [supabaseConfig]);

            // Sincronizar configurações do usuário com o Supabase
            const syncUserSettings = async (updatedData = data, updatedBrandName = brandName, updatedBrandLogoText = brandLogoText, updatedBrandLogoImage = brandLogoImage, updatedCopySettings = copySettings) => {
                if (!supabase || !user) return;
                try {
                    const { error } = await supabase
                        .from('user_settings')
                        .upsert({
                            user_id: user.id,
                            brand_name: updatedBrandName,
                            brand_logo_text: updatedBrandLogoText,
                            brand_logo_image: updatedBrandLogoImage,
                            copy_settings: updatedCopySettings,
                            cards_data: updatedData,
                            updated_at: new Date().toISOString()
                        });
                    if (error) console.error('Erro ao sincronizar com o Supabase:', error);
                } catch (err) {
                    console.error('Erro na requisição Supabase:', err);
                }
            };

            // Carregar configurações do banco de dados quando logado
            useEffect(() => {
                const loadRemoteSettings = async () => {
                    if (!supabase || !user) return;
                    try {
                        const { data: settings, error } = await supabase
                            .from('user_settings')
                            .select('*')
                            .eq('user_id', user.id)
                            .maybeSingle();

                        if (!error && settings) {
                            if (settings.brand_name) setBrandName(settings.brand_name);
                            if (settings.brand_logo_text) setBrandLogoText(settings.brand_logo_text);
                            if (settings.brand_logo_image) setBrandLogoImage(settings.brand_logo_image);
                            if (settings.copy_settings) setCopySettings(settings.copy_settings);
                            if (settings.cards_data) setData(settings.cards_data);
                        }
                    } catch (e) {
                        console.error("Erro ao carregar configurações do Supabase:", e);
                    }
                };

                loadRemoteSettings();
            }, [supabase, user]);

            const handleLogin = async (e) => {
                if (e) e.preventDefault();
                if (!supabase) {
                    setAuthError("Configure a conexão do Supabase primeiro.");
                    return;
                }
                if (!loginName.trim() || !loginPhone.trim()) {
                    setAuthError("Preencha todos os campos.");
                    return;
                }

                setAuthLoading(true);
                setAuthError('');

                try {
                    const cleanPhone = loginPhone.replace(/\D/g, '');
                    
                    // Buscar perfil pelo telefone
                    let { data: profile, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('phone', cleanPhone)
                        .maybeSingle();

                    if (error) throw error;

                    if (!profile) {
                        // Se não existe, cadastrar novo usuário
                        const { data: newProfile, error: insertError } = await supabase
                            .from('profiles')
                            .insert({
                                name: loginName.trim(),
                                phone: cleanPhone,
                                is_manager: false
                            })
                            .select()
                            .single();

                        if (insertError) throw insertError;
                        profile = newProfile;

                        // Criar configurações padrão
                        const { error: settingsError } = await supabase
                            .from('user_settings')
                            .insert({
                                user_id: profile.id,
                                brand_name: 'VORA CLOUD',
                                brand_logo_text: 'V',
                                brand_logo_image: '',
                                copy_settings: copySettings,
                                cards_data: getInitialDefaults()
                            });

                        if (settingsError) console.error("Erro ao criar configurações padrão:", settingsError);
                    }

                    // Registrar conexão no histórico
                    await supabase
                        .from('connection_history')
                        .insert({ user_id: profile.id });

                    // Salvar usuário na sessão
                    sessionStorage.setItem('vora_user', JSON.stringify(profile));
                    setUser(profile);

                    // Carregar configurações do usuário
                    const { data: settings, error: fetchSettingsError } = await supabase
                        .from('user_settings')
                        .select('*')
                        .eq('user_id', profile.id)
                        .maybeSingle();

                    if (!fetchSettingsError && settings) {
                        if (settings.brand_name) setBrandName(settings.brand_name);
                        if (settings.brand_logo_text) setBrandLogoText(settings.brand_logo_text);
                        if (settings.brand_logo_image) setBrandLogoImage(settings.brand_logo_image);
                        if (settings.copy_settings) setCopySettings(settings.copy_settings);
                        if (settings.cards_data) setData(settings.cards_data);
                    }

                    // Se for gestor, iniciar painel de gestor automaticamente
                    if (profile.is_manager) {
                        setIsManagerView(true);
                        fetchManagerData(profile);
                    } else {
                        setIsManagerView(false);
                    }

                } catch (err) {
                    console.error("Erro de autenticação:", err);
                    setAuthError("Falha na autenticação: " + err.message);
                } finally {
                    setAuthLoading(false);
                }
            };

            const handleLogout = () => {
                sessionStorage.removeItem('vora_user');
                setUser(null);
                setIsManagerView(false);
                // Resetar estados para padrão local
                setData(getInitialDefaults());
                setBrandName('VORA CLOUD');
                setBrandLogoText('V');
                setBrandLogoImage('');
            };

            const fetchManagerData = async (currentUser = user) => {
                if (!supabase || !currentUser || !currentUser.is_manager) return;

                try {
                    // Carregar perfis
                    const { data: profiles, error: pError } = await supabase
                        .from('profiles')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (pError) throw pError;
                    setProfilesList(profiles || []);

                    // Carregar histórico de conexões com informações do perfil
                    const { data: history, error: hError } = await supabase
                        .from('connection_history')
                        .select(`
                            id,
                            logged_in_at,
                            user_id,
                            profiles (
                                name,
                                phone
                            )
                        `)
                        .order('logged_in_at', { ascending: false })
                        .limit(100);

                    if (hError) throw hError;
                    setHistoryList(history || []);

                } catch (err) {
                    console.error("Erro ao carregar dados do gestor:", err);
                }
            };

            const viewUserRates = async (userId) => {
                if (!supabase) return;
                try {
                    const { data: settings, error } = await supabase
                        .from('user_settings')
                        .select('*')
                        .eq('user_id', userId)
                        .maybeSingle();

                    if (error) throw error;
                    setSelectedProfileRates(settings || { cards_data: [] });
                } catch (err) {
                    console.error("Erro ao buscar taxas do usuário:", err);
                    alert("Erro ao buscar taxas deste usuário.");
                }
            };

            // Atualizar dados do gestor periodicamente ou ao carregar a página
            useEffect(() => {
                if (user && user.is_manager && isManagerView) {
                    fetchManagerData();
                }
            }, [user, isManagerView]);

            const saveSupabaseConfig = (e) => {
                e.preventDefault();
                if (!configUrl.trim() || !configAnonKey.trim()) {
                    alert("Preencha todos os campos da conexão.");
                    return;
                }
                const newConfig = {
                    url: configUrl.trim(),
                    anonKey: configAnonKey.trim()
                };
                localStorage.setItem('vora_supabase_config', JSON.stringify(newConfig));
                setSupabaseConfig(newConfig);
                setIsConfiguringSupabase(false);
            };

            // Load saved state
            useEffect(() => {
                const localCopy = localStorage.getItem('vora_calc_copy_settings');
                if (localCopy) {
                    try {
                        const parsed = JSON.parse(localCopy);
                        const newer = {
                            tx: parsed.tx !== undefined ? parsed.tx : true,
                            total: parsed.total !== undefined ? parsed.total : true,
                            showPix: parsed.showPix !== undefined ? parsed.showPix : true,
                            showDebit: parsed.showDebit !== undefined ? parsed.showDebit : true,
                            copyPix: parsed.copyPix !== undefined ? parsed.copyPix : true,
                            copyDebit: parsed.copyDebit !== undefined ? parsed.copyDebit : true,
                            receiptTx: parsed.receiptTx !== undefined ? parsed.receiptTx : true,
                            receiptTotal: parsed.receiptTotal !== undefined ? parsed.receiptTotal : true
                        };
                        setCopySettings(newer);
                    } catch (e) {}
                }

                const savedBrand = localStorage.getItem('vora_calc_brand');
                if (savedBrand) {
                    try {
                        const parsed = JSON.parse(savedBrand);
                        if (parsed.name) setBrandName(parsed.name);
                        if (parsed.phrase) setBrandPhrase(parsed.phrase);
                        if (parsed.logoText) setBrandLogoText(parsed.logoText);
                        if (parsed.logoImage) setBrandLogoImage(parsed.logoImage);
                    } catch (e) {}
                }

                const saved = localStorage.getItem('vora_calc_data');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setData(parsed.map((col) => {
                            if (!col.maxParc) col.maxParc = col.rates?.length || 12;
                            if (col.debitRate === undefined) col.debitRate = 0;
                            if (col.pixRate === undefined) col.pixRate = 0;
                            const rates = [...(col.rates || [])];
                            while (rates.length < 24) rates.push(0);
                            return { ...col, debitRate: col.debitRate, pixRate: col.pixRate, rates };
                        }));
                    } catch (e) {
                        setData(getInitialDefaults());
                    }
                } else {
                    setData(getInitialDefaults());
                }
            }, []);

            const saveAndSetData = (newData) => {
                setData(newData);
                localStorage.setItem('vora_calc_data', JSON.stringify(newData));
                if (user) syncUserSettings(newData);
            };

            const addColumn = () => {
                const rates = new Array(24).fill(0);
                const newData = [...data, { name: 'Nova Bandeira', color: '#666666', maxParc: 12, pixRate: 0, debitRate: 0, rates }];
                saveAndSetData(newData);
                openSettings(newData.length - 1, newData);
            };

            const resetToDefaults = () => {
                if (confirm('ATENÇÃO: Restaurar TUDO para o padrão? Isso apagará TODAS as suas edições.')) {
                    saveAndSetData(getInitialDefaults());
                }
            };

            const openSettings = (idx, currentData = data) => {
                const col = currentData[idx];
                setModalData(JSON.parse(JSON.stringify(col))); // Deep copy
                setEditingIdx(idx);
                
                const ratesList = [];
                
                // PIX first
                const pxRate = col.pixRate !== undefined ? col.pixRate : 0;
                const pxCoef = 1 - pxRate / 100;
                ratesList.push({
                    installment: 'PIX',
                    percentStr: pxRate.toString().replace('.', ','),
                    coefStr: parseFloat(pxCoef.toFixed(6)).toString().replace('.', ',')
                });

                // DÉBITO second
                const dbRate = col.debitRate !== undefined ? col.debitRate : 0;
                const dbCoef = 1 - dbRate / 100;
                ratesList.push({
                    installment: 'DÉBITO',
                    percentStr: dbRate.toString().replace('.', ','),
                    coefStr: parseFloat(dbCoef.toFixed(6)).toString().replace('.', ',')
                });
                
                col.rates.forEach((rate, i) => {
                    const p = rate || 0;
                    const c = 1 - p / 100;
                    ratesList.push({
                        installment: i + 1,
                        percentStr: p.toString().replace('.', ','),
                        coefStr: parseFloat(c.toFixed(6)).toString().replace('.', ',')
                    });
                });
                
                setModalRates(ratesList);
            };

            const saveCurrent = () => {
                if (!modalData || editingIdx === null) return;

                let maxParc = modalData.maxParc;
                if (maxParc < 1) maxParc = 1;
                if (maxParc > 24) maxParc = 24;

                let pixRate = 0;
                let debitRate = 0;
                const rates = [];

                modalRates.forEach(item => {
                    const p = parseFloat(item.percentStr.replace(',', '.'));
                    const val = isNaN(p) ? 0 : p;
                    if (item.installment === 'PIX') {
                        pixRate = val;
                    } else if (item.installment === 'DÉBITO') {
                        debitRate = val;
                    } else {
                        const idx = parseInt(item.installment) - 1;
                        rates[idx] = val;
                    }
                });

                while (rates.length < 24) rates.push(0);

                const newData = [...data];
                newData[editingIdx] = { ...modalData, pixRate, debitRate, maxParc, rates };
                saveAndSetData(newData);
                setEditingIdx(null);
                setModalData(null);
                setModalRates([]);
            };

            const deleteCurrent = () => {
                if (editingIdx === null) return;

                const newData = [...data];
                newData.splice(editingIdx, 1);
                saveAndSetData(newData);
                setEditingIdx(null);
                setModalData(null);
                setModalRates([]);
            };

            const restoreCurrentDefault = () => {
                if (!modalData) return;
                const defRates = DEFAULT_RATES[modalData.name];
                const newRates = makeRates(defRates || []);
                
                const ratesList = [];
                // PIX default 0
                ratesList.push({
                    installment: 'PIX',
                    percentStr: '0',
                    coefStr: '1'
                });
                
                // DÉBITO default 0
                ratesList.push({
                    installment: 'DÉBITO',
                    percentStr: '0',
                    coefStr: '1'
                });
                
                newRates.forEach((rate, i) => {
                    const p = rate || 0;
                    const c = 1 - p / 100;
                    ratesList.push({
                        installment: i + 1,
                        percentStr: p.toString().replace('.', ','),
                        coefStr: parseFloat(c.toFixed(6)).toString().replace('.', ',')
                    });
                });
                setModalRates(ratesList);
            };

            const handlePercentChange = (i, valStr) => {
                const updated = [...modalRates];
                updated[i] = { ...updated[i], percentStr: valStr };
                
                const parsedStr = valStr.replace(',', '.');
                const p = parseFloat(parsedStr);
                if (!isNaN(p)) {
                    const c = 1 - p / 100;
                    updated[i].coefStr = parseFloat(c.toFixed(6)).toString().replace('.', ',');
                }
                setModalRates(updated);
            };

            const handleCoefChange = (i, valStr) => {
                const updated = [...modalRates];
                updated[i] = { ...updated[i], coefStr: valStr };
                
                const parsedStr = valStr.replace(',', '.');
                const c = parseFloat(parsedStr);
                if (!isNaN(c)) {
                    const p = (1 - c) * 100;
                    updated[i].percentStr = parseFloat(p.toFixed(4)).toString().replace('.', ',');
                }
                setModalRates(updated);
            };

            const toggleCopySetting = (key) => {
                const newer = { ...copySettings, [key]: !copySettings[key] };
                setCopySettings(newer);
                localStorage.setItem('vora_calc_copy_settings', JSON.stringify(newer));
                if (user) syncUserSettings(data, brandName, brandLogoText, brandLogoImage, newer);
            };

            const saveBrand = (key, val) => {
                let updated = {
                    name: brandName,
                    phrase: brandPhrase,
                    logoText: brandLogoText,
                    logoImage: brandLogoImage,
                    [key]: val
                };
                const newBrandName = key === 'name' ? val : brandName;
                const newBrandLogoText = key === 'logoText' ? val : brandLogoText;
                const newBrandLogoImage = key === 'logoImage' ? val : brandLogoImage;

                if (key === 'name') setBrandName(val);
                if (key === 'phrase') setBrandPhrase(val);
                if (key === 'logoText') setBrandLogoText(val);
                if (key === 'logoImage') setBrandLogoImage(val);
                localStorage.setItem('vora_calc_brand', JSON.stringify(updated));
                if (user) syncUserSettings(data, newBrandName, newBrandLogoText, newBrandLogoImage, copySettings);
            };

            const addPayment = () => {
                setMultiplePayments(prev => [
                    ...prev,
                    { id: Date.now() + Math.random(), amount: 0, type: 'cartao', brandIdx: 0, selectedOption: 1 }
                ]);
            };

            const clearAllMultiple = () => {
                setAmount('');
                setIsTrocaEnabled(false);
                setTrocaClient('');
                setTrocaDevice('');
                setTrocaValue(0);
                setMultiplePayments([]);
            };

            const removePayment = (id) => {
                setMultiplePayments(prev => prev.filter(p => p.id !== id));
            };

            const updatePayment = (id, changes) => {
                setMultiplePayments(prev => prev.map(p => {
                    if (p.id === id) {
                        const updated = { ...p, ...changes };
                        // Se o tipo de pagamento mudou, sincroniza a selectedOption padrão
                        if (changes.type && changes.type !== p.type) {
                            if (changes.type === 'cartao') updated.selectedOption = 1;
                            else if (changes.type === 'debito') updated.selectedOption = 'debito';
                            else if (changes.type === 'pix') updated.selectedOption = 'pix';
                            else if (changes.type === 'dinheiro') updated.selectedOption = 'dinheiro';
                            else if (changes.type === 'fixo') updated.selectedOption = 'fixo';
                        }
                        return updated;
                    }
                    return p;
                }));
            };

            const fillRemainingAmount = (paymentId) => {
                const troca = isTrocaEnabled ? parseFloat(trocaValue) || 0 : 0;
                const totalOthers = multiplePayments
                    .filter(p => p.id !== paymentId)
                    .reduce((sum, p) => sum + (p.amount || 0), 0);
                const remaining = Math.max(0, amount - troca - totalOthers);
                updatePayment(paymentId, { amount: remaining });
            };

            const getPaymentTypeLabel = (payment) => {
                if (payment.type === 'cartao') return `Crédito (${data[payment.brandIdx]?.name || ''})`;
                if (payment.type === 'debito') return `Débito (${data[payment.brandIdx]?.name || ''})`;
                if (payment.type === 'pix') return `Pix (${data[payment.brandIdx]?.name || ''})`;
                if (payment.type === 'dinheiro') return 'Dinheiro';
                if (payment.type === 'fixo') return 'Troca (Valor Fixo)';
                return '';
            };

            const copyPaymentTable = async (payment, payIdx) => {
                const id = `pay-table-${payment.id}`;
                let lines = [];
                const label = getPaymentTypeLabel(payment);
                lines.push(`Pagamento ${payIdx + 1}: ${label}`);

                if (payment.type === 'cartao') {
                    const card = data[payment.brandIdx] || data[0];
                    
                    if (copySettings.copyPix) {
                        const pixRate = card.pixRate !== undefined ? card.pixRate : 0;
                        const pixTotal = calculateTotal(payment.amount, pixRate);
                        lines.push(generateRowText(pixRate, pixTotal, 'Pix', pixTotal));
                    }

                    if (copySettings.copyDebit) {
                        const debitRate = card.debitRate !== undefined ? card.debitRate : 0;
                        const debitTotal = calculateTotal(payment.amount, debitRate);
                        lines.push(generateRowText(debitRate, debitTotal, 'Débito', debitTotal));
                    }

                    card.rates.slice(0, card.maxParc).forEach((rate, i) => {
                        const valTotal = calculateTotal(payment.amount, rate);
                        const parcVal = valTotal / (i + 1);
                        lines.push(generateRowText(rate, valTotal, i + 1, parcVal));
                    });
                } else if (payment.type === 'debito') {
                    const card = data[payment.brandIdx] || data[0];
                    const rate = card.debitRate !== undefined ? card.debitRate : 0;
                    const valTotal = calculateTotal(payment.amount, rate);
                    lines.push(generateRowText(rate, valTotal, 'Débito', valTotal));
                } else if (payment.type === 'pix') {
                    const card = data[payment.brandIdx] || data[0];
                    const rate = card.pixRate !== undefined ? card.pixRate : 0;
                    const valTotal = calculateTotal(payment.amount, rate);
                    lines.push(generateRowText(rate, valTotal, 'Pix', valTotal));
                } else if (payment.type === 'dinheiro') {
                    lines.push(generateRowText(0, payment.amount, 'Dinheiro', payment.amount));
                } else if (payment.type === 'fixo') {
                    lines.push(`Valor Fixo: R$ ${payment.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                }
                
                await handleCopy(lines.join('\n'), id);
            };
            const copyFullSummary = async () => {
                const id = 'full-summary-copy';
                let lines = [];
                lines.push(`--- ${brandName.toUpperCase()} ---`);
                lines.push(brandPhrase);
                
                if (trocaClient && trocaClient.trim()) {
                    lines.push('');
                    lines.push(`Cliente: ${trocaClient.trim()}`);
                }
                
                lines.push('');
                lines.push(`Total da Venda: R$ ${amount.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                
                if (isTrocaEnabled) {
                    const deviceDetail = trocaDevice && trocaDevice.trim() ? ` (${trocaDevice.trim()})` : '';
                    lines.push(`Crédito da Troca${deviceDetail}: - R$ ${parseFloat(trocaValue || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                }
                
                lines.push('');
                lines.push('Detalhamento do Pagamento:');
                
                multiplePayments.forEach((payment, i) => {
                    const num = i + 1;
                    const card = data[payment.brandIdx] || data[0] || { name: 'Sem Bandeira', pixRate: 0, debitRate: 0, rates: [] };
                    const amt = payment.amount || 0;
                    
                    if (payment.selectedOption === 'pix') {
                        const rate = card.pixRate !== undefined ? card.pixRate : 0;
                        const total = calculateTotal(amt, rate);
                        let details = [];
                        if (copySettings.receiptTx && rate > 0) {
                            details.push(`Taxa: ${rate.toString().replace('.', ',')}%`);
                        }
                        if (copySettings.receiptTotal) {
                            details.push(`Total cobrado: R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                        }
                        const detailsStr = details.length > 0 ? ` (${details.join(' | ')})` : '';
                        lines.push(`${num}. Pix (${card.name}): R$ ${amt.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}${detailsStr}`);
                    } else if (payment.selectedOption === 'debito') {
                        const rate = card.debitRate !== undefined ? card.debitRate : 0;
                        const total = calculateTotal(amt, rate);
                        let details = [];
                        if (copySettings.receiptTx && rate > 0) {
                            details.push(`Taxa: ${rate.toString().replace('.', ',')}%`);
                        }
                        if (copySettings.receiptTotal) {
                            details.push(`Total cobrado: R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                        }
                        const detailsStr = details.length > 0 ? ` (${details.join(' | ')})` : '';
                        lines.push(`${num}. Débito (${card.name}): R$ ${amt.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}${detailsStr}`);
                    } else if (payment.selectedOption === 'dinheiro') {
                        lines.push(`${num}. Dinheiro: R$ ${amt.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                    } else if (payment.selectedOption === 'fixo') {
                        lines.push(`${num}. Troca (Valor Fixo): R$ ${amt.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                    } else {
                        // Crédito
                        const installment = parseInt(payment.selectedOption) || 1;
                        const rate = card.rates[installment - 1] || 0;
                        const total = calculateTotal(amt, rate);
                        const parcVal = total / installment;
                        
                        let details = [];
                        details.push(`${installment}x de R$ ${parcVal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                        if (copySettings.receiptTx && rate > 0) {
                            details.push(`Taxa: ${rate.toString().replace('.', ',')}%`);
                        }
                        if (copySettings.receiptTotal) {
                            details.push(`Total cobrado: R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                        }
                        const detailsStr = details.length > 0 ? ` (${details.join(' | ')})` : '';
                        lines.push(`${num}. Crédito (${card.name} ${installment}x): R$ ${amt.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}${detailsStr}`);
                    }
                });
                
                const troca = isTrocaEnabled ? parseFloat(trocaValue) || 0 : 0;
                const totalPaid = troca + multiplePayments.reduce((sum, p) => sum + (p.amount || 0), 0);
                
                lines.push('');
                lines.push(`Total Pago: R$ ${totalPaid.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                
                if (totalPaid >= amount) {
                    const troco = totalPaid - amount;
                    lines.push(`Troco: R$ ${troco.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                } else {
                    const restante = amount - totalPaid;
                    lines.push(`Saldo Restante: R$ ${restante.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`);
                }
                lines.push('-----------------------------');
                
                await handleCopy(lines.join('\n'), id);
            };

            const handleCopy = async (text, id) => {
                const success = await copyToClipboard(text);
                if (success) {
                    setCopiedStates(prev => ({ ...prev, [id]: true }));
                    setTimeout(() => setCopiedStates(prev => ({ ...prev, [id]: false })), 2000);
                }
            };

            const generateRowText = (rate, total, installment, parcVal) => {
                const parcFormatted = parcVal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                const totalFormatted = total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                
                const label = typeof installment === 'number' 
                    ? `${installment}x de R$ ${parcFormatted}` 
                    : `${installment}: R$ ${parcFormatted}`;
                
                let parts = [label];
                if (copySettings.tx && rate > 0) parts.push(`Taxa: ${rate}%`);
                if (copySettings.total) parts.push(`Total: R$ ${totalFormatted}`);
                
                return parts.join(' | ');
            };

            const copyRow = async (rate, total, installment, parcVal, id) => {
                await handleCopy(generateRowText(rate, total, installment, parcVal), id);
            };

            const copyTable = async (card, id) => {
                let lines = [`Bandeira: ${card.name}`];
                
                if (copySettings.copyPix) {
                    const pixRate = card.pixRate !== undefined ? card.pixRate : 0;
                    const pixTotal = calculateTotal(amount, pixRate);
                    lines.push(generateRowText(pixRate, pixTotal, 'Pix', pixTotal));
                }
                
                if (copySettings.copyDebit) {
                    const debitRate = card.debitRate !== undefined ? card.debitRate : 0;
                    const debitTotal = calculateTotal(amount, debitRate);
                    lines.push(generateRowText(debitRate, debitTotal, 'Débito', debitTotal));
                }
                
                card.rates.slice(0, card.maxParc).forEach((rate, i) => {
                    const valTotal = calculateTotal(amount, rate);
                    if (rate > 0 || valTotal > 0) {
                        const parcVal = valTotal / (i + 1);
                        lines.push(generateRowText(rate, valTotal, i + 1, parcVal));
                    }
                });
                await handleCopy(lines.join('\n'), id);
            };

            const calculateTotal = (val, rate) => {
                if (rate >= 100) return 0;
                return (val * 100) / (100 - rate);
            };

            // Se o usuário não estiver logado, renderizar tela de login
            if (!user) {
                return (
                    <div className="flex-1 flex flex-col justify-center items-center p-4 md:p-8 min-h-screen bg-zinc-950 text-zinc-100">
                        <div className="w-full max-w-md bg-zinc-900 border border-white/5 rounded-[2.5rem] p-8 shadow-2xl space-y-6 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl -z-10" />
                            <div className="absolute bottom-0 left-0 w-64 h-64 bg-emerald-700/5 rounded-full blur-3xl -z-10" />
                            
                            <div className="text-center space-y-2">
                                <div className="mx-auto bg-[#004d1a] h-16 w-16 rounded-2xl flex items-center justify-center font-headline font-black text-white italic text-2xl shadow-xl">
                                    {brandLogoText || 'V'}
                                </div>
                                <h2 className="font-headline font-black uppercase tracking-tight text-white text-xl md:text-2xl pt-2">{brandName || 'VORA CLOUD'}</h2>
                                <p className="text-xs text-zinc-500 uppercase tracking-widest font-bold">{brandPhrase || 'Calculadora de Taxas Offline'}</p>
                            </div>

                            {isConfiguringSupabase ? (
                                <form onSubmit={saveSupabaseConfig} className="space-y-4 pt-4">
                                    <div className="flex justify-between items-center pb-2 border-b border-white/5">
                                        <h3 className="text-xs font-black uppercase tracking-wider text-white">Configurar Supabase</h3>
                                        <button type="button" onClick={() => setIsConfiguringSupabase(false)} className="text-[10px] font-black uppercase text-zinc-400 hover:text-white transition-colors">Voltar</button>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">URL do Projeto</label>
                                        <input
                                            type="text"
                                            required
                                            value={configUrl}
                                            onChange={(e) => setConfigUrl(e.target.value)}
                                            className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                            placeholder="https://xxxx.supabase.co"
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">Anon Key / API Key</label>
                                        <input
                                            type="password"
                                            required
                                            value={configAnonKey}
                                            onChange={(e) => setConfigAnonKey(e.target.value)}
                                            className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                            placeholder="Insira a Anon Key"
                                        />
                                    </div>
                                    <button type="submit" className="w-full h-12 rounded-2xl text-xs uppercase font-black tracking-widest bg-emerald-600 hover:bg-emerald-700 text-white transition-all shadow-lg font-bold">
                                        Salvar Conexão
                                    </button>
                                </form>
                            ) : (
                                <form onSubmit={handleLogin} className="space-y-4 pt-4">
                                    {authError && (
                                        <div className="p-3.5 bg-red-950/30 border border-red-900/40 rounded-xl text-red-400 text-xs font-bold text-center">
                                            {authError}
                                        </div>
                                    )}
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">Seu Nome</label>
                                        <input
                                            type="text"
                                            required
                                            value={loginName}
                                            onChange={(e) => setLoginName(e.target.value)}
                                            className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                            placeholder="Ex: João Silva"
                                        />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">Telefone (Whatsapp)</label>
                                        <input
                                            type="text"
                                            required
                                            value={loginPhone}
                                            onChange={(e) => setLoginPhone(e.target.value)}
                                            className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                            placeholder="Ex: 11999999999"
                                        />
                                    </div>
                                    <button 
                                        type="submit" 
                                        disabled={authLoading}
                                        className="w-full h-12 rounded-2xl text-xs uppercase font-black tracking-widest bg-emerald-600 hover:bg-emerald-700 text-white transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50 font-bold"
                                    >

                                                    </div>
                                                    <button 
                                                        onClick={() => saveBrand('logoImage', '')}
                                                        className="text-red-400 hover:text-red-500 text-[8px] font-black uppercase tracking-widest transition-colors"
                                                    >
                                                        Remover
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="pt-4 border-t border-white/5 shrink-0">
                                    <button onClick={() => setIsGlobalSettingsOpen(false)} className="w-full h-12 rounded-2xl text-[10px] uppercase font-black tracking-widest bg-emerald-600 hover:bg-emerald-700 text-white transition-all shadow-lg border-t border-white/20">
                                        Concluir
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
