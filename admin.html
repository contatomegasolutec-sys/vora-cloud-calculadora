<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Gestor - VORA</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#004d1a',
                            foreground: '#ffffff',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <style type="text/css">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f17;
            color: #f3f4f6;
        }
        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        /* WhatsApp button pulse animation */
        @keyframes pulse-whatsapp {
            0%, 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            50% { box-shadow: 0 0 0 12px rgba(37, 211, 102, 0); }
        }
    </style>

    <!-- React 18 & ReactDOM & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="h-full flex flex-col antialiased">
    
    <div id="root" class="h-full flex flex-col"></div>

    <!-- React Application Code -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom SVG Icons
        const CloudIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.47 0-.89.09-1.24.26A7 7 0 1 0 3 16.06V16a4 4 0 0 0 4 4h10.5Z"/></svg>
        );

        const WhatsAppIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        );

        // Floating WhatsApp Support Button Component
        const WhatsAppButton = () => (
            <a
                href="https://wa.me/5562994049949"
                target="_blank"
                rel="noopener noreferrer"
                className="fixed bottom-6 right-6 z-[200] bg-[#25D366] hover:bg-[#20BD5A] text-white h-14 w-14 rounded-full flex items-center justify-center shadow-2xl transition-all hover:scale-110 active:scale-95"
                title="Suporte via WhatsApp"
                style={{ animation: 'pulse-whatsapp 2s infinite' }}
            >
                <WhatsAppIcon />
            </a>
        );

        // Developer Footer Component
        const DevFooter = () => (
            <div className="w-full text-center py-4 mt-auto">
                <a
                    href="https://voracloud.com.br"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="text-[10px] text-zinc-600 hover:text-emerald-500 font-bold uppercase tracking-widest transition-colors"
                >
                    Desenvolvido por voracloud.com.br
                </a>
            </div>
        );

        function App() {
            // Supabase and Authentication State
            const [supabaseConfig] = useState({
                url: 'https://gejpfozexjxajahgtusr.supabase.co',
                anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlanBmb3pleGp4YWphaGd0dXNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzI3MjAsImV4cCI6MjA5MzMwODcyMH0.ivLVbj2jbhfXspNeC4NCN1O2NEIpfvarR_zU9w3FX3o'
            });
            const [supabase, setSupabase] = useState(null);
            const [user, setUser] = useState(() => {
                const saved = sessionStorage.getItem('vora_admin_user');
                return saved ? JSON.parse(saved) : null;
            });

            // Login Form inputs
            const [loginName, setLoginName] = useState('');
            const [loginPhone, setLoginPhone] = useState('');
            const [authError, setAuthError] = useState('');
            const [authLoading, setAuthLoading] = useState(false);

            // Manager Panel State
            const [profilesList, setProfilesList] = useState([]);
            const [historyList, setHistoryList] = useState([]);
            const [selectedProfileRates, setSelectedProfileRates] = useState(null);
            const [managerSearch, setManagerSearch] = useState('');

            // Inicializar cliente do Supabase
            useEffect(() => {
                try {
                    const client = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);
                    setSupabase(client);
                } catch (e) {
                    console.error("Erro ao inicializar cliente Supabase:", e);
                }
            }, [supabaseConfig]);

            // Carregar dados do gestor periodicamente ou ao logar
            const fetchManagerData = async (currentUser = user) => {
                if (!supabase || !currentUser || !currentUser.is_manager) return;

                try {
                    // Carregar perfis
                    const { data: profiles, error: pError } = await supabase
                        .from('profiles')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (pError) throw pError;
                    setProfilesList(profiles || []);

                    // Carregar histórico de conexões
                    const { data: history, error: hError } = await supabase
                        .from('connection_history')
                        .select(`
                            id,
                            logged_in_at,
                            user_id,
                            profiles (
                                name,
                                phone
                            )
                        `)
                        .order('logged_in_at', { ascending: false })
                        .limit(100);

                    if (hError) throw hError;
                    setHistoryList(history || []);

                } catch (err) {
                    console.error("Erro ao carregar dados do gestor:", err);
                }
            };

            useEffect(() => {
                if (supabase && user && user.is_manager) {
                    fetchManagerData();
                    const interval = setInterval(fetchManagerData, 15000); // Auto refresh a cada 15s
                    return () => clearInterval(interval);
                }
            }, [supabase, user]);

            const handleLogin = async (e) => {
                if (e) e.preventDefault();
                if (!supabase) {
                    setAuthError("Erro de conexão com o banco de dados.");
                    return;
                }
                if (!loginName.trim() || !loginPhone.trim()) {
                    setAuthError("Preencha todos os campos.");
                    return;
                }

                setAuthLoading(true);
                setAuthError('');

                try {
                    const cleanPhone = loginPhone.replace(/\D/g, '');
                    
                    // Buscar perfil pelo telefone
                    let { data: profile, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('phone', cleanPhone)
                        .maybeSingle();

                    if (error) throw error;

                    if (!profile) {
                        // Se não existe, não permitimos criar um gestor diretamente via tela
                        setAuthError("Usuário não cadastrado como Gestor.");
                        setAuthLoading(false);
                        return;
                    }

                    if (!profile.is_manager) {
                        setAuthError("Acesso restrito a gestores.");
                        setAuthLoading(false);
                        return;
                    }

                    // Registrar conexão no histórico
                    await supabase
                        .from('connection_history')
                        .insert({ user_id: profile.id });

                    // Salvar usuário na sessão
                    sessionStorage.setItem('vora_admin_user', JSON.stringify(profile));
                    setUser(profile);
                    fetchManagerData(profile);

                } catch (err) {
                    console.error("Erro de autenticação:", err);
                    setAuthError("Falha na autenticação: " + err.message);
                } finally {
                    setAuthLoading(false);
                }
            };

            const handleLogout = () => {
                sessionStorage.removeItem('vora_admin_user');
                setUser(null);
                setProfilesList([]);
                setHistoryList([]);
            };

            const viewUserRates = async (userId) => {
                if (!supabase) return;
                try {
                    const { data: settings, error } = await supabase
                        .from('user_settings')
                        .select('*')
                        .eq('user_id', userId)
                        .maybeSingle();

                    if (error) throw error;
                    setSelectedProfileRates(settings || { cards_data: [] });
                } catch (err) {
                    console.error("Erro ao buscar taxas do usuário:", err);
                    alert("Erro ao buscar taxas deste usuário.");
                }
            };

            // Se o gestor não estiver logado, renderizar tela de login de admin
            if (!user) {
                return (
                    <div className="flex-1 flex flex-col justify-center items-center p-4 md:p-8 min-h-screen bg-zinc-950 text-zinc-100">
                        <div className="w-full max-w-md bg-zinc-900 border border-white/5 rounded-[2.5rem] p-8 shadow-2xl space-y-6 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl -z-10" />
                            <div className="absolute bottom-0 left-0 w-64 h-64 bg-emerald-700/5 rounded-full blur-3xl -z-10" />
                            
                            <div className="text-center space-y-2">
                                <div className="mx-auto bg-[#004d1a] h-16 w-16 rounded-2xl flex items-center justify-center font-headline font-black text-white italic text-2xl shadow-xl">
                                    V
                                </div>
                                <h2 className="font-headline font-black uppercase tracking-tight text-white text-xl md:text-2xl pt-2">PAINEL DE CONTROLE</h2>
                                <p className="text-xs text-zinc-500 uppercase tracking-widest font-bold">Acesso Exclusivo para Gestores</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-4 pt-4">
                                {authError && (
                                    <div className="p-3.5 bg-red-950/30 border border-red-900/40 rounded-xl text-red-400 text-xs font-bold text-center">
                                        {authError}
                                    </div>
                                )}
                                <div className="space-y-1">
                                    <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">Nome do Gestor</label>
                                    <input
                                        type="text"
                                        required
                                        value={loginName}
                                        onChange={(e) => setLoginName(e.target.value)}
                                        className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                        placeholder="Ex: Administrador Vora"
                                    />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-zinc-500 text-[9px] font-black tracking-widest uppercase block">Telefone do Gestor</label>
                                    <input
                                        type="text"
                                        required
                                        value={loginPhone}
                                        onChange={(e) => setLoginPhone(e.target.value)}
                                        className="w-full h-12 border border-white/10 bg-black/30 font-bold text-xs px-4 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition-all"
                                        placeholder="Ex: 123456789"
                                    />
                                </div>
                                <button 
                                    type="submit" 
                                    disabled={authLoading}
                                    className="w-full h-12 rounded-2xl text-xs uppercase font-black tracking-widest bg-emerald-600 hover:bg-emerald-700 text-white transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50 font-bold"
                                >
                                    {authLoading ? "Acessando..." : "Entrar no Painel"}
                                </button>
                            </form>
                        </div>
                        <DevFooter />
                    </div>
                );
            }

            // Interface principal do Gestor
            return (
                <div className="flex-1 flex flex-col bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-8 space-y-6">
                    <div className="max-w-7xl mx-auto w-full space-y-6">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shrink-0 pb-4 border-b border-white/5">
                            <div>
                                <h2 className="font-headline font-black text-xl md:text-2xl uppercase tracking-tight text-white flex items-center gap-2">
                                    Painel do Gestor
                                    <span className="text-[10px] font-black tracking-widest bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full uppercase">Admin</span>
                                </h2>
                                <p className="text-xs text-zinc-500 uppercase tracking-widest font-bold">Gerencie usuários, taxas e visualize logs de conexões</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={handleLogout} 
                                    className="h-10 px-4 bg-white/5 hover:bg-red-500/10 text-zinc-400 hover:text-red-400 border border-white/10 hover:border-red-500/20 rounded-xl text-xs uppercase tracking-widest transition-all flex items-center justify-center font-bold"
                                >
                                    Sair do Painel
                                </button>
                            </div>
                        </div>

                        {/* Dashboard Stats */}
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                            <div className="bg-zinc-900 border border-white/5 rounded-[1.5rem] p-5 flex flex-col justify-between">
                                <span className="text-[10px] text-zinc-500 font-black tracking-wider uppercase">Total de Usuários</span>
                                <span className="text-3xl font-black text-white mt-2 font-headline">{profilesList.length}</span>
                            </div>
                            <div className="bg-zinc-900 border border-white/5 rounded-[1.5rem] p-5 flex flex-col justify-between">
                                <span className="text-[10px] text-zinc-500 font-black tracking-wider uppercase">Logins Efetuados</span>
                                <span className="text-3xl font-black text-emerald-400 mt-2 font-headline">{historyList.length}</span>
                            </div>
                            <div className="bg-zinc-900 border border-white/5 rounded-[1.5rem] p-5 flex flex-col justify-between">
                                <span className="text-[10px] text-zinc-500 font-black tracking-wider uppercase">Sua Sessão</span>
                                <span className="text-xs font-black text-zinc-400 mt-2 uppercase truncate">{user.name} ({user.phone})</span>
                            </div>
                        </div>

                        {/* Main Grid */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Lista de Usuários */}
                            <div className="lg:col-span-2 bg-zinc-900 border border-white/5 rounded-[2rem] p-6 shadow-xl flex flex-col min-h-[500px]">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 pb-4 border-b border-white/5 mb-4">
                                    <h3 className="font-headline font-black text-sm uppercase text-white">Usuários Cadastrados</h3>
                                    <input
                                        type="text"
                                        placeholder="Buscar usuário..."
                                        value={managerSearch}
                                        onChange={(e) => setManagerSearch(e.target.value)}
                                        className="h-9 px-3 w-full sm:w-48 bg-black/30 border border-white/10 rounded-lg text-xs font-bold text-white focus:outline-none focus:border-emerald-500 transition-all placeholder-white/30"
                                    />
                                </div>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b border-white/5">
                                                <th className="py-2 text-[9px] font-black uppercase tracking-wider text-zinc-500">Nome</th>
                                                <th className="py-2 text-[9px] font-black uppercase tracking-wider text-zinc-500">Telefone</th>
                                                <th className="py-2 text-[9px] font-black uppercase tracking-wider text-zinc-500 text-center">Tipo</th>
                                                <th className="py-2 text-[9px] font-black uppercase tracking-wider text-zinc-500 text-right">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/[0.03]">
                                            {profilesList.filter(p => p.name.toLowerCase().includes(managerSearch.toLowerCase()) || p.phone.includes(managerSearch)).map((profile) => (
                                                <tr key={profile.id} className="hover:bg-white/[0.01] transition-colors">
                                                    <td className="py-3 font-bold text-xs text-white">{profile.name}</td>
                                                    <td className="py-3 font-mono text-xs text-zinc-400">{profile.phone}</td>
                                                    <td className="py-3 text-center">
                                                        <span className={`text-[8px] font-black tracking-widest px-2 py-0.5 rounded-full ${profile.is_manager ? 'bg-blue-500/10 text-blue-400' : 'bg-zinc-800 text-zinc-400'}`}>
                                                            {profile.is_manager ? 'GESTOR' : 'OPERADOR'}
                                                        </span>
                                                    </td>
                                                    <td className="py-3 text-right">
                                                        <button 
                                                            onClick={() => viewUserRates(profile.id)}
                                                            className="h-8 px-3 bg-white/5 hover:bg-emerald-500/10 hover:text-emerald-400 rounded-lg text-[10px] uppercase font-black tracking-wider transition-all"
                                                        >
                                                            Ver Taxas
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* Histórico de Conexões */}
                            <div className="bg-zinc-900 border border-white/5 rounded-[2rem] p-6 shadow-xl flex flex-col">
                                <div className="pb-4 border-b border-white/5 mb-4">
                                    <h3 className="font-headline font-black text-sm uppercase text-white">Histórico de Conexão</h3>
                                </div>

                                <div className="space-y-3 overflow-y-auto max-h-[450px] pr-1">
                                    {historyList.map((log) => {
                                        const name = log.profiles?.name || 'Desconhecido';
                                        const phone = log.profiles?.phone || '';
                                        const date = new Date(log.logged_in_at).toLocaleString('pt-BR');
                                        return (
                                            <div key={log.id} className="bg-white/5 border border-white/5 rounded-xl p-3 flex flex-col gap-1">
                                                <div className="flex justify-between items-center">
                                                    <span className="font-bold text-xs text-white">{name}</span>
                                                    <span className="text-[8px] font-mono text-zinc-500">{date}</span>
                                                </div>
                                                <span className="text-[10px] font-mono text-zinc-400">{phone}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* Modal de Exibição de Taxas do Usuário */}
                        {selectedProfileRates && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-in fade-in duration-200">
                                <div className="w-full max-w-lg bg-zinc-900 border border-white/10 rounded-[2rem] p-6 shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
                                    <div className="flex justify-between items-center pb-4 border-b border-white/5 mb-4 shrink-0">
                                        <h4 className="font-headline font-black text-base uppercase text-white">Taxas Configuradas</h4>
                                        <button 
                                            onClick={() => setSelectedProfileRates(null)} 
                                            className="text-[10px] font-black uppercase text-zinc-400 hover:text-white transition-colors"
                                        >
                                            Fechar
                                        </button>
                                    </div>

                                    <div className="space-y-4 overflow-y-auto flex-1 pr-1 pb-4">
                                        <div className="bg-[#004d1a]/20 border border-[#004d1a]/20 rounded-xl p-4">
                                            <div className="text-[9px] text-[#004d1a] font-black uppercase tracking-widest">Identidade Visual</div>
                                            <div className="text-sm font-black text-white mt-1">{selectedProfileRates.brand_name || 'VORA CLOUD'}</div>
                                        </div>

                                        <div className="space-y-3">
                                            {selectedProfileRates.cards_data && selectedProfileRates.cards_data.length > 0 ? (
                                                selectedProfileRates.cards_data.map((card, cIdx) => (
                                                    <div key={cIdx} className="bg-white/5 border border-white/5 rounded-2xl p-4">
                                                        <div className="flex justify-between items-center pb-2 border-b border-white/5 mb-2">
                                                            <span className="font-bold text-xs uppercase text-white" style={{ color: card.color }}>{card.name}</span>
                                                            <span className="text-[9px] font-black text-zinc-500 uppercase">Max {card.maxParc}x</span>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-2 text-xs font-mono">
                                                            {card.pixRate !== undefined && (
                                                                <div className="flex justify-between bg-black/20 p-2 rounded-lg">
                                                                    <span className="text-zinc-500 font-bold uppercase text-[9px]">PIX</span>
                                                                    <span className="text-emerald-500 font-black">{card.pixRate}%</span>
                                                                </div>
                                                            )}
                                                            {card.debitRate !== undefined && (
                                                                <div className="flex justify-between bg-black/20 p-2 rounded-lg">
                                                                    <span className="text-zinc-500 font-bold uppercase text-[9px]">DEB</span>
                                                                    <span className="text-[#004d1a] font-black">{card.debitRate}%</span>
                                                                </div>
                                                            )}
                                                            {card.rates && card.rates.slice(0, card.maxParc).map((rate, rIdx) => (
                                                                <div key={rIdx} className="flex justify-between bg-black/20 p-2 rounded-lg">
                                                                    <span className="text-zinc-500">{rIdx + 1}x</span>
                                                                    <span className="text-white font-black">{rate}%</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))
                                            ) : (
                                                <div className="text-center text-zinc-500 py-8 text-xs font-bold uppercase">Nenhuma taxa cadastrada.</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        <DevFooter />
                    </div>
                    <WhatsAppButton />
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
